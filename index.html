<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>解憂占卜站 | 靈境塔羅</title>
    
    <meta property="og:title" content="🔮 解憂占卜站｜靈境塔羅：領取你的專屬啟示">
    <meta property="og:description" content="【閉上雙眼，誠心感應】此刻的困惑，在牌陣中自有解答。這份來自宇宙的指引，將為你照亮前路。">
    <meta property="og:url" content="https://axmy13.github.io/tarot-/">
    <meta property="og:image" content="https://axmy13.github.io/tarot-/cover.jpg">
    <meta property="og:type" content="website">

    <style>
        :root { --bg: #0a1128; --gold: #d4af37; --card-bg: #ffffff; --text: #f4f4f4; }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: 'PingFang SC', sans-serif; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        header { text-align: center; padding: 40px 20px; }
        h1 { color: var(--gold); letter-spacing: 5px; margin: 0; font-size: 2.2rem; text-shadow: 0 0 10px rgba(212, 175, 55, 0.5); }
        .container { width: 92%; max-width: 900px; }
        
        /* 三欄佈局 */
        .tarot-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin: 35px 0; }
        .card-slot { text-align: center; }
        .slot-label { color: var(--gold); font-weight: bold; margin-bottom: 12px; font-size: 1.1rem; }
        .card-content { background: var(--card-bg); color: #222; border-radius: 12px; padding: 20px; min-height: 260px; border: 2px solid var(--gold); display: none; animation: fadeIn 0.8s ease-out; box-shadow: 0 10px 25px rgba(0,0,0,0.6); }
        .card-name { font-size: 1.3rem; font-weight: bold; color: #1a237e; border-bottom: 2px solid var(--gold); margin-bottom: 12px; padding-bottom: 8px; }
        .card-meaning { font-size: 0.95rem; line-height: 1.7; text-align: left; margin-bottom: 15px; }
        .card-advice { font-size: 0.9rem; color: #b71c1c; font-weight: bold; text-align: left; border-top: 1px dashed #ddd; padding-top: 10px; }

        .btn-group { display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; margin-bottom: 40px; }
        button { padding: 12px 28px; border-radius: 30px; border: none; font-weight: bold; cursor: pointer; transition: 0.3s; font-size: 1rem; }
        .btn-main { background: var(--gold); color: #000; box-shadow: 0 4px 15px rgba(212, 175, 55, 0.4); }
        .btn-sec { background: rgba(255,255,255,0.1); color: #fff; border: 1px solid var(--gold); }
        button:hover { transform: translateY(-2px); opacity: 0.9; }
        
        .log-section { width: 100%; border-top: 1px solid rgba(212,175,55,0.3); padding-top: 25px; margin-bottom: 50px; }
        .log-item { background: rgba(255,255,255,0.05); padding: 15px; border-radius: 8px; margin-bottom: 10px; font-size: 0.9rem; border-left: 4px solid var(--gold); }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        @media (max-width: 768px) { .tarot-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<header>
    <h1>解憂占卜站</h1>
    <div style="color:var(--gold); opacity: 0.9; font-size: 1rem; margin-top:10px;">✨ 辛言老師推薦 ｜ 靈境塔羅 ✨</div>
</header>

<div class="container">
    <div class="tarot-grid">
        <div class="card-slot"><div class="slot-label">【過去】</div><div id="c1" class="card-content"></div></div>
        <div class="card-slot"><div class="slot-label">【現在】</div><div id="c2" class="card-content"></div></div>
        <div class="card-slot"><div class="slot-label">【未來】</div><div id="c3" class="card-content"></div></div>
    </div>

    <div class="btn-group">
        <button class="btn-main" onclick="draw()">✨ 啟動靈境牌陣 ✨</button>
        <button class="btn-sec" onclick="shareToFB()">臉書分享</button>
        <button class="btn-sec" onclick="location.reload()">重新感應</button>
    </div>

    <div class="log-section">
        <div style="color:var(--gold); margin-bottom:15px; font-weight: bold;">占卜記錄</div>
        <div id="logs"></div>
    </div>
</div>

<script>
// 核心塔羅數據庫：包含牌名、深度解說與建議
const tarotDeck = [
    {n:"愚者 (The Fool)", m:"代表冒險與純真。你正處於一個全新階段的起點，雖然前路未知，但充滿無限可能。", a:"大膽邁出第一步，不要被過去的恐懼束縛。"},
    {n:"魔術師 (The Magician)", m:"象徵創造力與掌控。你擁有解決問題所需的所有資源、技能與才華。", a:"現在是將想法付諸行動的最佳時機，果斷執行。"},
    {n:"女祭司 (The High Priestess)", m:"代表直覺與內在智慧。某些真相隱藏在表象之下，需要你靜下心來感悟。", a:"信任你的直覺，減少外部干擾，聽從內心的聲音。"},
    {n:"皇后 (The Empress)", m:"象徵富足、滋養與豐收。這是充滿創造力與生命力的時期，情感或事業將迎來果實。", a:"學會享受當下的美好，給予自己和他人更多的慈愛。"},
    {n:"皇帝 (The Emperor)", m:"代表穩定、權力與秩序。目前需要強大的意志力和組織能力來掌控局面。", a:"制定清晰的計劃，展現領導力，建立穩定的結構。"},
    {n:"教皇 (The Hierophant)", m:"代表傳統、信仰與指引。你可能需要尋求長輩、導師或傳統體系的協助。", a:"遵循既定的準則，尋求智慧的建議，保持學習的心態。"},
    {n:"戀人 (The Lovers)", m:"象徵選擇、和諧與價值觀。你正站在重要的分叉路口，需要平衡理智與情感。", a:"做出符合你真心的選擇，珍惜身邊重要的夥伴關係。"},
    {n:"戰車 (The Chariot)", m:"代表勝利、意志與行動。雖然面臨衝突，但憑藉堅強的鬥志，你必能克服萬難。", a:"保持專注，控制好情緒的韁繩，勇往直前。"},
    {n:"力量 (Strength)", desc:"象徵內在勇氣與韌性。真正的力量並非暴力，而是用溫柔與耐心去化解困難。", a:"以柔克剛，保持耐心，用你的堅韌去感化他人。"},
    {n:"隱士 (The Hermit)", m:"代表內省、孤獨與智慧。現在是向內探索的時刻，暫時遠離塵囂會讓你更清醒。", a:"給自己一點獨處的時間，反思過去，釐清未來的方向。"},
    {n:"命運之輪 (Wheel of Fortune)", m:"象徵改變與機緣。生活即將迎來新的轉機，好運正悄然降臨。", a:"順應時勢的變化，抓住轉瞬即逝的機會，保持樂觀。"},
    {n:"正義 (Justice)", m:"代表平衡、誠實與因果。你過去的付出現在將會得到應有的回報或結論。", a:"行事公平正直，客觀分析利弊，承擔應有的責任。"},
    {n:"倒吊人 (The Hanged Man)", m:"象徵換位思考與犧牲。暫時的停滯並非退步，而是在醞釀更大的智慧。", a:"換一個角度看問題，學會放手，等待最佳的轉變契機。"},
    {n:"死神 (Death)", m:"代表結束與新生。舊的事物必須離去，才能為新的機會騰出空間。不要害怕改變。", a:"勇敢告別不再適合你的過去，擁抱即將到來的蛻變。"},
    {n:"節制 (Temperance)", m:"象徵平衡、融合與協調。你需要整合不同的元素，尋找生活中的黃金分割點。", a:"保持適度，不要極端，在溝通與行動中尋求最大公約數。"},
    {n:"惡魔 (The Devil)", m:"代表束縛、慾望與陰影。你可能被某種執念或不健康的習慣所困擾。", a:"正視你的慾望，擺脫不必要的依賴，找回心靈的自由。"},
    {n:"高塔 (The Tower)", m:"象徵劇變與覺醒。突如其來的衝擊雖然痛苦，但它打破了虛偽的假象。", a:"接受不可抗拒的改變，從廢墟中重建更堅固的自我。"},
    {n:"星星 (The Star)", m:"代表希望、靈感與療癒。這是一個平靜的時刻，指引你找回內心的願景。", a:"保持信心，讓靈感引導你，未來的曙光就在前方。"},
    {n:"月亮 (The Moon)", m:"象徵潛意識與迷茫。不安與幻想可能遮蔽了真相，請警惕隱藏的威脅。", a:"穿透迷霧，信任直覺但不盲從，等待光明的回歸。"},
    {n:"太陽 (The Sun)", m:"代表成功、喜悅與活力。正向的能量正在照耀你，所有的努力都將大放異彩。", a:"盡情展現自我，保持童心，與他人分享你的光芒。"},
    {n:"審判 (Judgement)", m:"象徵覺醒與評判。一個重要的決定或轉折點已到，你需要對過往做出結算。", a:"誠實面對自我，聽從天啟的召喚，開始嶄新的生活。"},
    {n:"世界 (The World)", m:"代表圓滿、成就與合一。你已成功達成目標，感到前所未有的充實與滿足。", a:"慶祝這份完美，感謝所有的相遇，準備開啟下一個循環。"}
];

function draw() {
    // 隨機抽選三張牌
    let shuffled = [...tarotDeck].sort(() => 0.5 - Math.random());
    let picks = shuffled.slice(0, 3);

    picks.forEach((card, i) => {
        const el = document.getElementById(`c${i+1}`);
        el.innerHTML = `
            <div class="card-name">${card.n}</div>
            <div class="card-meaning">${card.m}</div>
            <div class="card-advice">💡 建議：${card.a}</div>
        `;
        el.style.display = 'block';
    });

    // 紀錄 Log
    const timeStr = new Date().toLocaleTimeString();
    const logStr = `<div class="log-item"><strong>${timeStr}</strong> - ${picks.map(p=>p.n.split(' ')[0]).join(' | ')}</div>`;
    document.getElementById('logs').insertAdjacentHTML('afterbegin', logStr);
}

function shareToFB() {
    const url = encodeURIComponent(window.location.href);
    window.open(`https://www.facebook.com/sharer/sharer.php?u=${url}`, '_blank');
}
</script>
</body>
</html>
