<!DOCTYPE html>

<head>
    <meta charset="UTF-8">

    <title>辛言解憂站 | 靈境塔羅</title>
    <style>
        :root { --bg: #0a1128; --gold: #d4af37; --card-bg: #ffffff; --text: #f4f4f4; --accent: #b71c1c; }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: 'PingFang SC', sans-serif; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        
        .container { width: 94%; max-width: 720px; }
        
        nav { display: flex; justify-content: space-around; padding: 15px 0; border-bottom: 1px solid rgba(212,175,55,0.3); width: 100%; background: rgba(10, 17, 40, 0.9); position: sticky; top: 0; z-index: 100; }
        nav a { color: var(--gold); text-decoration: none; font-weight: bold; font-size: 0.9rem; transition: 0.3s; }

        .hero-image { width: 100%; border-radius: 12px; margin-top: 15px; box-shadow: 0 0 20px rgba(212,175,55,0.3); }
        header { text-align: center; padding: 20px; }
        h1 { color: var(--gold); letter-spacing: 5px; font-size: 1.8rem; margin: 5px 0; }
        .quote-box { background: rgba(212,175,55,0.1); border: 1px solid var(--gold); padding: 12px; border-radius: 8px; margin: 10px 0; font-size: 0.95rem; color: var(--gold); line-height: 1.6; text-align: center; min-height: 1.5rem; }

        .tarot-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 20px 0; }
        .slot-label { color: var(--gold); font-weight: bold; margin-bottom: 8px; font-size: 0.8rem; text-align: center; }
        
        /* 卡牌視覺化 */
        .card-container { perspective: 1000px; }
        .card-content { 
            background: #111 url('logo.png') no-repeat center center; 
            background-size: 50%;
            color: #222; 
            border-radius: 10px; 
            padding: 12px; 
            min-height: 350px; 
            border: 2px solid var(--gold); 
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1); 
            transform-style: preserve-3d;
            text-align: left;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            cursor: pointer;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        /* 翻牌動畫 */
        .card-content.is-flipped { 
            background: var(--card-bg); 
            transform: rotateY(180deg); 
            justify-content: flex-start;
            align-items: stretch;
        }

        /* 逆位翻轉動畫：水平翻轉再垂直翻轉 */
        .card-content.is-reversed { 
            background: var(--card-bg); 
            transform: rotateY(180deg) rotateZ(180deg);
            justify-content: flex-start;
            align-items: stretch;
        }

        /* 內容物文字修正（防止倒過來） */
        .inner-text { transform: none; }
        .is-flipped .inner-text { transform: rotateY(180deg); }
        .is-reversed .inner-text { transform: rotateY(180deg) rotateZ(180deg); }

        .card-name { font-size: 1.1rem; font-weight: bold; color: #1a237e; border-bottom: 2px solid var(--gold); margin-bottom: 8px; padding-bottom: 5px; text-align: center; }
        .dim { margin-bottom: 8px; font-size: 0.75rem; line-height: 1.4; }
        .dim b { color: var(--accent); display: block; border-left: 3px solid var(--accent); padding-left: 5px; margin-bottom: 2px; }
        .advice { font-size: 0.7rem; color: #1b5e20; font-weight: bold; border-top: 1px dashed #ccc; padding-top: 8px; margin-top: 5px; }

        .btn-group { display: flex; flex-direction: column; align-items: center; gap: 12px; margin: 20px 0; }
        button { padding: 12px 0; border-radius: 30px; border: none; font-weight: bold; cursor: pointer; font-size: 1.1rem; transition: 0.3s; width: 80%; }
        .btn-main { background: var(--gold); color: #000; box-shadow: 0 4px 15px rgba(212,175,55,0.4); }
        .btn-sec { background: transparent; color: var(--gold); border: 1px solid var(--gold); font-size: 0.9rem; }

        .log-section { width: 100%; border-top: 1px solid rgba(212,175,55,0.2); padding-top: 20px; margin-bottom: 60px; }
        .log-item { background: rgba(255,255,255,0.05); padding: 10px; border-radius: 8px; margin-bottom: 8px; font-size: 0.8rem; border-left: 4px solid var(--gold); }

        @media (max-width: 480px) { 
            .tarot-grid { grid-template-columns: 1fr; }
            .card-content { min-height: auto; padding: 15px; }
        }
    </style>
</head>

    let pickedRaw = shuffled.slice(0, 3);
    
    currentPicks = pickedRaw.map(p => ({
        ...p,
        isRev: Math.random() < 0.5 // 隨機正逆位
    }));
    
    document.getElementById('daily-quote').innerText = "✨ 能量場已啟動，請點擊三張牌背進行感應。";
}

function flip(id) {
    if (currentPicks.length === 0) {
        alert("請先點擊啟動按鈕！");
        return;
    }
    const el = document.getElementById(`c${id}`);
    if (el.classList.contains('is-flipped') || el.classList.contains('is-reversed')) return;

    const card = currentPicks[id-1];
    const data = card.isRev ? card.r : card.u;
    const statusText = card.isRev ? '<span style="color:#b71c1c">【逆位】</span>' : '<span style="color:#1b5e20">【正位】</span>';

    el.innerHTML = `
        <div class="inner-text">
            <div class="card-name">${card.n}<br>${statusText}</div>
            <div class="dim"><b>❤️ 愛情發展</b>${data.l}</div>
            <div class="dim"><b>💼 事業運勢</b>${data.w}</div>
            <div class="dim"><b>💰 財運指引</b>${data.m}</div>
            <div class="advice">💡 建議：${data.a}</div>
        </div>
    `;

    if (card.isRev) el.classList.add('is-reversed');
    else el.classList.add('is-flipped');

    // 三張翻完更新日誌
    if (document.querySelectorAll('.is-flipped, .is-reversed').length === 3) {
        updateLogs();
    }
}

function updateLogs() {
    const logContainer = document.getElementById('logs');
    const timeStr = new Date().toLocaleTimeString();
    const names = currentPicks.map(p => `${p.n}${p.isRev?'(逆)':'(正)'}`).join(' | ');
    logContainer.insertAdjacentHTML('afterbegin', `<div class="log-item"><strong>${timeStr}</strong> - ${names}</div>`);
    if (logContainer.children.length > 5) logContainer.removeChild(logContainer.lastChild);
}

function shareToFB() {
    const url = encodeURIComponent(window.location.href);
    window.open(`https://www.facebook.com/sharer/sharer.php?u=${url}`, '_blank');
}
</script>
