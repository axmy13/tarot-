<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>灵境塔罗 - 忘忧占卜站</title>
    <style>
        :root {
            --primary-bg: #0f0c29;
            --accent-gold: #d4af37;
            --text-color: #e0e0e0;
            --card-back: #1c1c3c;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
            touch-action: manipulation;
        }

        header {
            text-align: center;
            padding: 20px;
            width: 100%;
        }

        h1 {
            font-size: 1.8rem;
            color: var(--accent-gold);
            text-shadow: 0 0 10px rgba(212, 175, 55, 0.5);
            margin-bottom: 5px;
        }

        .container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
            max-width: 1000px;
            padding: 10px;
            perspective: 1000px;
        }

        .card-container {
            width: 100px;
            height: 180px;
            perspective: 1000px;
            cursor: pointer;
        }

        .card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            text-align: center;
            transition: transform 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            transform-style: preserve-3d;
        }

        .card-inner.flipped {
            transform: rotateY(180deg);
        }

        .card-front, .card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 10px;
            border: 2px solid var(--accent-gold);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 10px;
            box-sizing: border-box;
        }

        .card-back {
            background-color: var(--card-back);
            background-image: radial-gradient(circle, #2c2c5c 1px, transparent 1px);
            background-size: 10px 10px;
        }

        .card-front {
            background-color: #fff;
            color: #333;
            transform: rotateY(180deg);
        }

        .card-label {
            position: absolute;
            top: -25px;
            width: 100%;
            text-align: center;
            color: var(--accent-gold);
            font-size: 0.9rem;
        }

        .controls {
            margin: 30px 0;
            display: flex;
            gap: 15px;
        }

        button {
            padding: 12px 25px;
            font-size: 1rem;
            background: transparent;
            color: var(--accent-gold);
            border: 2px solid var(--accent-gold);
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.2);
            -webkit-tap-highlight-color: transparent;
        }

        button:active {
            transform: scale(0.95);
            background: rgba(212, 175, 55, 0.1);
        }

        #history {
            width: 90%;
            max-width: 600px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 50px;
        }

        .history-item {
            border-bottom: 1px solid rgba(212, 175, 55, 0.3);
            padding: 10px 0;
            font-size: 0.9rem;
        }

        @media (min-width: 600px) {
            .card-container { width: 160px; height: 280px; }
            h1 { font-size: 2.5rem; }
        }
    </style>
</head>
<body>

<header>
    <h1>✨ 灵境塔罗 ✨</h1>
    <p>静心思考你的问题，然后开启牌阵</p>
</header>

<div class="container">
    <div class="card-container">
        <div class="card-label">过去</div>
        <div class="card-inner" id="cardPast">
            <div class="card-back">❂</div>
            <div class="card-front"></div>
        </div>
    </div>
    <div class="card-container">
        <div class="card-label">现在</div>
        <div class="card-inner" id="cardPresent">
            <div class="card-back">❂</div>
            <div class="card-front"></div>
        </div>
    </div>
    <div class="card-container">
        <div class="card-label">未来</div>
        <div class="card-inner" id="cardFuture">
            <div class="card-back">❂</div>
            <div class="card-front"></div>
        </div>
    </div>
</div>

<div class="controls">
    <button id="drawBtn">🔮 展开牌阵</button>
    <button id="resetHistoryBtn">🧹 清空记录</button>
</div>

<div id="history">
    <h3 style="color: var(--accent-gold); margin-top: 0;">占卜记录</h3>
    <div id="historyList"></div>
</div>

<script>
    const tarotDeck = [
        { name: "愚者", desc: "新的开始，冒险，纯真。" },
        { name: "魔术师", desc: "行动，创造力，意志力。" },
        { name: "女祭司", desc: "直觉，神秘，潜意识。" },
        { name: "皇后", desc: "丰饶，母性，自然。" },
        { name: "皇帝", desc: "权威，结构，稳定。" },
        { name: "教皇", desc: "传统，信仰，指引。" },
        { name: "恋人", desc: "选择，和谐，爱情。" },
        { name: "战车", desc: "意志，胜利，自律。" },
        { name: "力量", desc: "勇气，耐心，柔中带刚。" },
        { name: "隐士", desc: "内省，孤独，寻找真理。" },
        { name: "命运之轮", desc: "转机，运气，因果循环。" },
        { name: "正义", desc: "平衡，诚实，责任。" },
        { name: "倒吊人", desc: "牺牲，换个角度，等待。" },
        { name: "死神", desc: "结束，转变，新生。" },
        { name: "节制", desc: "平衡，节制，融合。" },
        { name: "恶魔", desc: "束缚，沉迷，物质诱惑。" },
        { name: "高塔", desc: "剧变，觉醒，解构。" },
        { name: "星星", desc: "希望，灵感，宁静。" },
        { name: "月亮", desc: "不安，幻象，潜意识。" },
        { name: "太阳", desc: "成功，快乐，活力。" },
        { name: "审判", desc: "觉醒，复活，评估。" },
        { name: "世界", desc: "圆满，成就，旅行。" }
    ];

    const cardPast = document.getElementById('cardPast');
    const cardPresent = document.getElementById('cardPresent');
    const cardFuture = document.getElementById('cardFuture');
    const drawBtn = document.getElementById('drawBtn');
    const resetHistoryBtn = document.getElementById('resetHistoryBtn');
    const historyList = document.getElementById('historyList');

    let historyData = JSON.parse(localStorage.getItem('tarotHistory')) || [];

    function drawRandomCard() {
        return tarotDeck[Math.floor(Math.random() * tarotDeck.length)];
    }

    function renderCardFront(element, cardData) {
        const front = element.querySelector('.card-front');
        front.innerHTML = `<strong style="font-size:1.2rem;color:#24243e">${cardData.name}</strong>
                           <p style="font-size:0.8rem;margin-top:10px">${cardData.desc}</p>`;
    }

    function resetAllCards() {
        cardPast.classList.remove('flipped');
        cardPresent.classList.remove('flipped');
        cardFuture.classList.remove('flipped');
    }

    function performDivination() {
        resetAllCards();
        
        setTimeout(() => {
            const res = {
                past: drawRandomCard(),
                present: drawRandomCard(),
                future: drawRandomCard(),
                time: new Date().toLocaleString()
            };

            renderCardFront(cardPast, res.past);
            renderCardFront(cardPresent, res.present);
            renderCardFront(cardFuture, res.future);

            requestAnimationFrame(() => {
                setTimeout(() => {
                    cardPast.classList.add('flipped');
                    cardPresent.classList.add('flipped');
                    cardFuture.classList.add('flipped');
                    
                    historyData.unshift(res);
                    if(historyData.length > 10) historyData.pop();
                    localStorage.setItem('tarotHistory', JSON.stringify(historyData));
                    updateHistoryUI();
                }, 100);
            });
        }, 300);
    }

    function updateHistoryUI() {
        historyList.innerHTML = historyData.map(item => `
            <div class="history-item">
                <small>${item.time}</small><br>
                ${item.past.name} | ${item.present.name} | ${item.future.name}
            </div>
        `).join('');
    }

    function resetHistory() {
        if(confirm('确定要清空所有记录吗？')) {
            historyData = [];
            localStorage.removeItem('tarotHistory');
            updateHistoryUI();
        }
    }

    // 兼容 iPad 触控
    const clickEvent = 'ontouchstart' in window ? 'touchstart' : 'click';
    drawBtn.addEventListener(clickEvent, (e) => {
        if(e.type === 'touchstart') e.preventDefault();
        performDivination();
    });

    resetHistoryBtn.addEventListener(clickEvent, (e) => {
        if(e.type === 'touchstart') e.preventDefault();
        resetHistory();
    });

    updateHistoryUI();
</script>
</body>
</html>
