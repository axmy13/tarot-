<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>神秘塔罗牌占卜 | 灵境塔罗</title>
    <meta name="description" content="抽一张塔罗牌，聆听命运的答案。心诚则灵。">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #1a0f1a 0%, #0f0a1a 100%);
            font-family: 'Segoe UI', 'Poppins', system-ui, -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        /* 动态星光粒子 */
        .star {
            position: fixed;
            background: white;
            border-radius: 50%;
            opacity: 0;
            pointer-events: none;
            z-index: 1;
            animation: twinkle 3s ease-in-out infinite;
        }
        @keyframes twinkle {
            0%, 100% { opacity: 0; transform: scale(0.5); }
            50% { opacity: 0.8; transform: scale(1); }
        }

        .container {
            max-width: 700px;
            width: 100%;
            background: rgba(25, 15, 35, 0.65);
            backdrop-filter: blur(12px);
            border-radius: 64px;
            padding: 24px 20px 40px;
            box-shadow: 0 25px 45px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.1);
            border: 1px solid rgba(210, 180, 140, 0.5);
            z-index: 2;
            position: relative;
        }

        .container::after {
            content: '✦  ✦  ✦';
            position: absolute;
            bottom: 18px;
            left: 0;
            right: 0;
            text-align: center;
            font-size: 12px;
            letter-spacing: 6px;
            color: #c9aa6f;
            opacity: 0.5;
        }

        h1 {
            text-align: center;
            font-size: 2.1rem;
            letter-spacing: 4px;
            background: linear-gradient(135deg, #f3e7c9, #d8b56e);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 6px;
            text-shadow: 0 0 20px rgba(216,181,110,0.3);
        }

        .sub {
            text-align: center;
            color: #b8aa8c;
            font-size: 0.75rem;
            letter-spacing: 2px;
            display: inline-block;
            width: auto;
            margin: 0 auto 20px;
            padding-top: 8px;
            font-style: italic;
        }

        .card-area {
            display: flex;
            justify-content: center;
            margin: 20px 0 20px;
            perspective: 800px;
        }

        .tarot-card {
            width: 280px;
            height: 380px;
            background: #2a1e2e;
            border-radius: 24px;
            cursor: pointer;
            transition: all 0.5s cubic-bezier(0.2, 0.9, 0.4, 1.2);
            box-shadow: 0 20px 30px -10px rgba(0,0,0,0.6);
            position: relative;
            transform-style: preserve-3d;
        }

        .tarot-card:hover {
            transform: translateY(-10px) scale(1.02);
            box-shadow: 0 30px 40px -12px black;
        }

        .card-front, .card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 24px;
            backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: all 0.6s ease;
        }

        .card-back {
            background: radial-gradient(circle at 30% 25%, #2f2138, #160e1a);
            border: 2px solid #c9aa6f;
            box-shadow: inset 0 0 30px rgba(0,0,0,0.5), 0 0 15px rgba(201,170,111,0.3);
            transform: rotateY(0deg);
        }

        .card-back::before {
            content: "◈ 塔罗 ◈";
            font-size: 1.4rem;
            font-weight: bold;
            color: #d6b16e;
            letter-spacing: 6px;
            text-shadow: 0 0 5px #ffd58c;
        }

        .card-back::after {
            content: "✧ 点击启示 ✧";
            position: absolute;
            bottom: 30px;
            font-size: 0.7rem;
            color: #b48b4b;
        }

        .card-front {
            background: linear-gradient(145deg, #fef7e0, #f4e5c7);
            transform: rotateY(180deg);
            padding: 18px 12px;
            text-align: center;
            color: #2e1e2a;
            border: 8px double #b47c48;
            box-shadow: inset 0 0 20px rgba(180,124,72,0.2);
        }

        .tarot-card.flipped {
            transform: rotateY(180deg);
        }

        .card-name {
            font-size: 1.8rem;
            font-weight: bold;
            margin-top: 15px;
            border-bottom: 2px solid #b47c48;
            display: inline-block;
            padding-bottom: 5px;
            margin-bottom: 10px;
        }

        .card-symbol {
            font-size: 3.5rem;
            margin: 15px 0 10px;
            filter: drop-shadow(2px 2px 4px rgba(0,0,0,0.2));
        }

        .card-meaning {
            font-size: 1rem;
            line-height: 1.45;
            margin: 10px 10px;
            background: rgba(180, 124, 72, 0.15);
            padding: 12px;
            border-radius: 32px;
            font-weight: 500;
        }

        .card-luck {
            margin-top: 10px;
            font-size: 1rem;
            font-weight: bold;
            background: linear-gradient(95deg, #e9dbbd, #dfce9e);
            display: inline-block;
            padding: 6px 16px;
            border-radius: 40px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .btn-draw {
            display: block;
            width: 80%;
            margin: 30px auto 10px;
            background: linear-gradient(95deg, #c9aa6f, #b58d4f);
            border: none;
            padding: 14px 0;
            font-size: 1.3rem;
            font-weight: bold;
            color: #1f1225;
            border-radius: 60px;
            cursor: pointer;
            font-family: inherit;
            letter-spacing: 3px;
            box-shadow: 0 8px 18px rgba(0,0,0,0.3);
            transition: all 0.2s ease;
            position: relative;
            overflow: hidden;
        }

        .btn-draw::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: left 0.5s;
        }

        .btn-draw:hover::before {
            left: 100%;
        }

        .btn-draw:active {
            transform: scale(0.96);
        }

        .history-area {
            margin-top: 28px;
            background: rgba(0,0,0,0.35);
            border-radius: 48px;
            padding: 14px 16px;
            backdrop-filter: blur(4px);
        }

        .history-title {
            font-size: 0.75rem;
            letter-spacing: 3px;
            color: #e2ca9a;
            text-align: center;
            margin-bottom: 10px;
        }

        .history-list {
            max-height: 150px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .history-item {
            background: #2c1e2c60;
            border-radius: 60px;
            padding: 6px 12px;
            font-size: 0.8rem;
            display: flex;
            justify-content: space-between;
            color: #eedbba;
            border-left: 4px solid #c9aa6f;
        }

        .history-name {
            font-weight: bold;
        }

        .history-message {
            font-size: 0.7rem;
        }

        .reset-history {
            background: none;
            border: 1px solid #7f6a4a;
            color: #cbbf96;
            font-size: 0.6rem;
            padding: 4px 12px;
            border-radius: 30px;
            cursor: pointer;
            margin-top: 8px;
            display: block;
            margin-left: auto;
            margin-right: auto;
            transition: all 0.2s;
        }

        .reset-history:hover {
            background: #4f3a2e60;
            color: #ffecb3;
        }

        footer {
            text-align: center;
            font-size: 0.65rem;
            margin-top: 22px;
            color: #7e6e54;
        }

        @media (max-width: 500px) {
            .tarot-card { width: 240px; height: 340px; }
            .card-name { font-size: 1.5rem; }
            .card-symbol { font-size: 3rem; }
            .btn-draw { font-size: 1rem; }
        }
    </style>
</head>
<body>

<script>
    // 动态生成星光
    function createStars() {
        for (let i = 0; i < 100; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            star.style.left = Math.random() * 100 + '%';
            star.style.top = Math.random() * 100 + '%';
            star.style.width = Math.random() * 3 + 1 + 'px';
            star.style.height = star.style.width;
            star.style.animationDelay = Math.random() * 5 + 's';
            star.style.animationDuration = Math.random() * 3 + 2 + 's';
            document.body.appendChild(star);
        }
    }
    createStars();
</script>

<div class="container">
    <h1>✦ 灵境塔罗 ✦</h1>
    <div style="text-align: center;"><span class="sub">⚡ 抽一张牌 · 聆听命运的答案 ⚡</span></div>

    <div class="card-area">
        <div class="tarot-card" id="tarotCard">
            <div class="card-back"></div>
            <div class="card-front" id="cardFront">
                <div class="card-name">?</div>
                <div class="card-symbol">🔮</div>
                <div class="card-meaning">点击抽取牌面，命运之轮转动...</div>
                <div class="card-luck">✨ 静心触摸 ✨</div>
            </div>
        </div>
    </div>

    <button class="btn-draw" id="drawBtn">✨ 抽取塔罗牌 ✨</button>

    <div class="history-area">
        <div class="history-title">📜 占卜纪事录</div>
        <div class="history-list" id="historyList">
            <div class="history-item" style="opacity:0.7;">✨ 点击抽牌，启示将在此显现 ✨</div>
        </div>
        <button class="reset-history" id="resetHistoryBtn">🗑 清空记录</button>
    </div>
    <footer>心诚则灵 · 每张牌皆映照当下之念</footer>
</div>

<script>
    const tarotDeck = [
        { name: "愚者", symbol: "🃟", meaning: "新的开始往往伴随着未知，不一定要准备好才能出发", luck: "🌿 天真但不盲目" },
        { name: "魔术师", symbol: "🪄", meaning: "你拥有行动所需的资源与能力，关键是从第一个小动作开始", luck: "✨ 专注即力量" },
        { name: "女祭司", symbol: "🌙", meaning: "有些答案不在表面，安静下来之后才会浮现", luck: "🕯️ 信任潜意识" },
        { name: "皇后", symbol: "🌸", meaning: "滋养自己与享受美好，是一种值得培养的能力", luck: "💐 接纳丰盛" },
        { name: "皇帝", symbol: "👑", meaning: "建立秩序和界限是必要的，也可以保留一点柔软", luck: "🏛️ 稳而不僵" },
        { name: "教皇", symbol: "⛪", meaning: "传统与他人的经验可以参考，但最终要回到你自己的感受", luck: "📿 择其善者" },
        { name: "恋人", symbol: "💞", meaning: "选择带来成长，即使选错，也会让你更清楚自己", luck: "💘 为自己的选择负责" },
        { name: "战车", symbol: "🏇", meaning: "冲突与困难是意志力的试金石，坚持和绕路都是智慧", luck: "🚀 意志主导" },
        { name: "力量", symbol: "🦁", meaning: "真正的力量往往不是对抗，而是耐心与温柔地面对", luck: "❤️ 以柔克刚" },
        { name: "隐士", symbol: "🏔️", meaning: "独处与反思不是逃避，是在为下一步积蓄光亮", luck: "🔦 内省即指引" },
        { name: "命运之轮", symbol: "🎡", meaning: "生活中总有无法控制的起伏，顺应它会轻松一些", luck: "🍃 接纳无常" },
        { name: "正义", symbol: "⚖️", meaning: "因果真实不虚，你此刻能做的，只是对当下诚实", luck: "📜 种因得果" },
        { name: "倒吊人", symbol: "🪢", meaning: "暂停、换个角度，有时比硬闯更能看清出路", luck: "🌀 换个视野" },
        { name: "死神", symbol: "💀", meaning: "结束总带着不舍，但死去的部分会为新的可能腾出空间", luck: "🌱 自然代谢" },
        { name: "节制", symbol: "🏺", meaning: "平衡不是静止，是在两端之间慢慢调整", luck: "🌊 调和与耐心" },
        { name: "恶魔", symbol: "👹", meaning: "执念与习惯很难一下子摆脱，先看见它，就已经是松动", luck: "🔗 觉察即自由" },
        { name: "高塔", symbol: "🗼", meaning: "突如其来的冲击让人痛苦，但也可能拆掉了早该离开的", luck: "⚡ 崩塌后重建" },
        { name: "星星", symbol: "⭐", meaning: "希望未必能解决问题，但它能让你愿意再走一步", luck: "🌟 微光不灭" },
        { name: "月亮", symbol: "🌕", meaning: "恐惧与不安常来自"不知道"，先安抚自己，再去看清", luck: "🌙 面对潜意识" },
        { name: "太阳", symbol: "☀️", meaning: "当你感到清晰、轻松、温暖时，好好享受，这不常有", luck: "🎈 全然喜悦" },
        { name: "审判", symbol: "📯", meaning: "你心里早就知道什么该放下、什么该继续，只是还没准备好", luck: "🔔 内在召唤" },
        { name: "世界", symbol: "🌍", meaning: "一段旅程完成时，回望来路，你会感谢那个没放弃的自己", luck: "🏁 完整与整合" }
    ];

    let historyRecords = [];
    const tarotCardDiv = document.getElementById('tarotCard');
    const cardFront = document.getElementById('cardFront');
    const drawBtn = document.getElementById('drawBtn');
    const historyListEl = document.getElementById('historyList');
    const resetHistoryBtn = document.getElementById('resetHistoryBtn');

    let isFlipped = false;
    let currentCardData = null;

    // 抽牌音效（用Web Audio API生成一个简单的神秘音效）
    function playDrawSound() {
        try {
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            oscillator.frequency.value = 440;
            gainNode.gain.value = 0.15;
            oscillator.type = 'sine';
            oscillator.start();
            gainNode.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + 0.8);
            oscillator.stop(audioCtx.currentTime + 0.8);
        } catch(e) { console.log("音效不支持"); }
    }

    function renderCardFront(card) {
        cardFront.innerHTML = `
            <div class="card-name">${card.name}</div>
            <div class="card-symbol">${card.symbol}</div>
            <div class="card-meaning">「 ${card.meaning} 」</div>
            <div class="card-luck">✨ ${card.luck} ✨</div>
        `;
    }

    function addHistoryRecord(card) {
        const now = new Date();
        const timeStr = `${now.getMonth()+1}/${now.getDate()} ${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}`;
        historyRecords.unshift({ name: card.name, shortMeaning: card.luck, time: timeStr });
        if (historyRecords.length > 8) historyRecords.pop();
        updateHistoryUI();
    }

    function updateHistoryUI() {
        if (historyRecords.length === 0) {
            historyListEl.innerHTML = `<div class="history-item" style="opacity:0.7;">✨ 暂无占卜记录，点击抽牌 ✨</div>`;
            return;
        }
        let html = '';
        for (let rec of historyRecords) {
            html += `<div class="history-item"><span class="history-name">📜 ${rec.name}</span><span class="history-message">${rec.shortMeaning}  ·  ${rec.time}</span></div>`;
        }
        historyListEl.innerHTML = html;
    }

    function resetHistory() {
        historyRecords = [];
        updateHistoryUI();
        const tip = document.createElement('div');
        tip.innerText = '✨ 占卜记录已洁净 ✨';
        tip.style.cssText = 'position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#2a1d2c;color:#f3deba;padding:6px 18px;border-radius:60px;font-size:0.7rem;z-index:999';
        document.body.appendChild(tip);
        setTimeout(() => tip.remove(), 1500);
    }

    function drawRandomCard() {
        const randomIndex = Math.floor(Math.random() * tarotDeck.length);
        return { ...tarotDeck[randomIndex] };
    }

    function performDivination() {
        playDrawSound();
        const newCard = drawRandomCard();
        currentCardData = newCard;
        
        if (isFlipped) {
            tarotCardDiv.classList.remove('flipped');
            isFlipped = false;
            setTimeout(() => {
                renderCardFront(newCard);
                tarotCardDiv.classList.add('flipped');
                isFlipped = true;
                addHistoryRecord(newCard);
            }, 160);
        } else {
            renderCardFront(newCard);
            tarotCardDiv.classList.add('flipped');
            isFlipped = true;
            addHistoryRecord(newCard);
        }
    }

    function resetCardToBack() {
        if (isFlipped) {
            tarotCardDiv.classList.remove('flipped');
            isFlipped = false;
            cardFront.innerHTML = `
                <div class="card-name">?</div>
                <div class="card-symbol">🔮</div>
                <div class="card-meaning">点击抽取牌面，命运之轮转动...</div>
                <div class="card-luck">✨ 静心触摸 ✨</div>
            `;
            currentCardData = null;
        }
    }

    drawBtn.addEventListener('click', performDivination);
    resetHistoryBtn.addEventListener('click', resetHistory);
    tarotCardDiv.addEventListener('dblclick', (e) => {
        e.stopPropagation();
        resetCardToBack();
    });

    function init() {
        tarotCardDiv.classList.remove('flipped');
        isFlipped = false;
        cardFront.innerHTML = `
            <div class="card-name">?</div>
            <div class="card-symbol">🔮</div>
            <div class="card-meaning">点击抽取牌面，命运之轮转动...</div>
            <div class="card-luck">✨ 静心触摸 ✨</div>
        `;
        currentCardData = null;
        updateHistoryUI();
    }
    init();
</script>
</body>
</html>
