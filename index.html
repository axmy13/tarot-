<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>靈境塔羅 - 忘憂占卜站</title>

    <meta property="og:title" content="👉 點擊開啟：默唸你的困惑，領取塔羅啟示">
    <meta property="og:description" content="閉上雙眼，誠心感應。三牌陣將為你揭示過去、現在與未來的指引。✨">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://axmy13.github.io/myoracle/"> <meta property="og:image" content="https://axmy13.github.io/myoracle/logo.png">

    <style>
        :root { --primary-bg: #0f0c29; --accent-gold: #d4af37; --text-color: #e0e0e0; --card-back-bg: #1c1c3c; --card-front-bg: #fff; }
        body { margin: 0; padding: 0; font-family: 'PingFang SC', sans-serif; background: linear-gradient(135deg, #0f0c29 0%, #302b63 100%); color: var(--text-color); display: flex; flex-direction: column; align-items: center; min-height: 100vh; overflow-x: hidden; }
        
        header { text-align: center; padding: 25px 0 10px; }
        h1 { font-size: 2.2rem; color: var(--accent-gold); margin: 0; text-shadow: 0 0 15px rgba(212, 175, 55, 0.5); }
        .subtitle { font-size: 0.9rem; opacity: 0.8; margin-top: 5px; letter-spacing: 2px; }

        /* 儀式感引導語區塊 */
        #dailyQuote { 
            width: 90%; max-width: 600px; 
            background: rgba(212, 175, 55, 0.1); 
            border: 1px solid rgba(212, 175, 55, 0.3); 
            padding: 15px; border-radius: 12px; 
            margin: 15px 0; text-align: center; 
            font-size: 1rem; color: #fff;
            box-shadow: 0 0 20px rgba(0,0,0,0.3);
        }

        .container { display: flex; flex-wrap: wrap; justify-content: center; gap: 12px; perspective: 1500px; margin-bottom: 20px; padding: 10px; }
        .card-container { width: 105px; height: 185px; position: relative; }
        .card-label { position: absolute; top: -25px; width: 100%; text-align: center; color: var(--accent-gold); font-size: 0.85rem; font-weight: bold; letter-spacing: 1px; }
        
        .card-inner { position: relative; width: 100%; height: 100%; transition: transform 0.8s; transform-style: preserve-3d; cursor: pointer; }
        .card-inner.flipped { transform: rotateY(180deg); }
        
        .card-front, .card-back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 12px; border: 2px solid var(--accent-gold); display: flex; flex-direction: column; align-items: center; box-sizing: border-box; }
        .card-back { background-color: var(--card-back-bg); justify-content: center; font-size: 3rem; color: var(--accent-gold); box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        
        .card-front { 
            background-color: var(--card-front-bg); color: #24243e; transform: rotateY(180deg); 
            justify-content: flex-start; padding: 12px 8px;
            background: linear-gradient(to bottom, #fff 0%, #f0f0f0 100%);
        }
        
        .card-name { font-size: 1.1rem; font-weight: bold; margin-bottom: 8px; color: #302b63; border-bottom: 1px solid #d4af37; width: 100%; text-align: center; }
        .card-desc { font-size: 0.75rem; line-height: 1.6; text-align: justify; color: #444; }

        .controls { margin: 15px 0; display: flex; flex-direction: column; gap: 12px; width: 85%; max-width: 300px; }
        button { 
            padding: 12px 25px; font-size: 1rem; border-radius: 50px; cursor: pointer; 
            transition: 0.3s; font-weight: bold; letter-spacing: 1px;
        }
        #drawBtn { background: transparent; color: var(--accent-gold); border: 2px solid var(--accent-gold); }
        #drawBtn:hover { background: rgba(212, 175, 55, 0.1); }
        #shareBtn { background: linear-gradient(45deg, #d4af37, #b8860b); color: #000; border: none; }

        #history { width: 90%; max-width: 600px; background: rgba(255, 255, 255, 0.05); border-radius: 10px; padding: 15px; margin-top: 20px; margin-bottom: 40px; }
        .history-item { border-bottom: 1px solid rgba(212, 175, 55, 0.1); padding: 12px 0; font-size: 0.85rem; }
        #resetHistoryBtn { background: transparent; border: none; color: #888; font-size: 0.7rem; text-decoration: underline; margin-top: 10px; }

        @media (min-width: 600px) { 
            .card-container { width: 160px; height: 280px; } 
            .card-name { font-size: 1.4rem; } 
            .card-desc { font-size: 0.95rem; } 
        }
    </style>
</head>
<body>

<header>
    <h1>忘憂占卜站</h1>
    <div class="subtitle">✨ 辛言老師 🔮 靈境塔羅 ✨</div>
</header>

<div id="dailyQuote">
    <div id="quoteText">請閉上雙眼，心中默唸困惑你的問題...<br>待內心平靜後，開啟牌陣。</div>
</div>

<div class="container">
    <div class="card-container"><div class="card-label">過去</div><div class="card-inner" id="cardPast"><div class="card-back">❂</div><div class="card-front"></div></div></div>
    <div class="card-container"><div class="card-label">現在</div><div class="card-inner" id="cardPresent"><div class="card-back">❂</div><div class="card-front"></div></div></div>
    <div class="card-container"><div class="card-label">未來</div><div class="card-inner" id="cardFuture"><div class="card-back">❂</div><div class="card-front"></div></div></div>
</div>

<div class="controls">
    <button id="drawBtn">✨ 開啟牌陣 ✨</button>
    <button id="shareBtn" onclick="shareToFB()">🙏 分享祝福</button>
    <button id="resetHistoryBtn">清空歷史記錄</button>
</div>

<div id="history">
    <h3 style="color:var(--accent-gold);margin:0;font-size:1rem;border-bottom:1px solid var(--accent-gold);padding-bottom:5px;">占卜記錄</h3>
    <div id="historyList"></div>
</div>

<script>
    const tarotDeck = [
        { name: "愚者", desc: "旅程的開始，放下恐懼，以純真的心擁抱未知。相信直覺，大膽邁出第一步。" },
        { name: "魔術師", desc: "你擁有創造現實的能力。現在是行動時刻，運用意志力去達成你的夢想。" },
        { name: "女祭司", desc: "轉向內在，傾聽直覺的聲音。答案深藏在潛意識中，信任你的內在智慧。" },
        { name: "皇后", desc: "預示著富足與滋養。感受自然的韻律，享受當下的美好，讓愛自然流動。" },
        { name: "皇帝", desc: "建立秩序與權威。運用理性和自律掌控局面，穩紮穩打构建你的夢想藍圖。" },
        { name: "教皇", desc: "尋求精神指引。遵循成熟規範，在傳統智慧中找到前行的力量。" },
        { name: "戀人", desc: "和諧的結合與重要選擇。請依據內心的真實想法，尋找身心合一的平衡。" },
        { name: "戰車", desc: "勝利來自於堅強意志。保持專注，掌控內在矛盾，克服障礙勇往直前。" },
        { name: "力量", desc: "真正的力量源於內心。用溫和化解危機，用愛感化衝動，展現內在堅韌。" },
        { name: "隱士", desc: "內省與尋求真理。獨處並非孤獨，在寧靜中審視自我，智慧將在靜默中湧現。" },
        { name: "命運之輪", desc: "轉機與週期。生活正如車輪不斷旋轉，接受變化，轉機已至，保持覺察。" },
        { name: "正義", desc: "平衡與責任。以客觀冷靜的態度對待局勢，做出公正選擇，收穫你種下的果。" },
        { name: "倒吊人", desc: "犧牲與等待。換個角度看世界，這種停滯是必要的洗禮，往往能豁然開朗。" },
        { name: "死神", desc: "週期的結束與新生。坦然接受陳舊事物的離去，以開放的心擁抱新的可能。" },
        { name: "節制", desc: "平衡與融合。運用耐心和諧地結合不同元素，保持平和，讓一切水到渠成。" },
        { name: "惡魔", desc: "束縛與誘惑。找回理智打破枷鎖，這種束縛往往源於你內心的執著和恐懼。" },
        { name: "高塔", desc: "劇變與覺醒。陳舊結構崩塌是為了迎接真實自我，真實終將在廢墟中重建。" },
        { name: "星星", desc: "希望與靈性滋養。抬起頭感受治愈力量，希望永存，你正走在正確的道路上。" },
        { name: "月亮", desc: "不安與幻象。不要被迷霧蒙蔽，深入潛意識去尋找答案，有些事還需要時間。" },
        { name: "太陽", desc: "全面成功與快樂。盡情享受陽光般的喜悅，展現真實自我，成功已至盡情閃耀。" },
        { name: "審判", desc: "覺醒與復活。總結過去，赦免錯誤，以全新的面貌去迎接未來，生命重塑。" },
        { name: "世界", desc: "圓滿與成就。達到了目標，感到充實滿足。成就已成，世界就在你腳下。" }
    ];

    let currentResult = null;
    const cp = document.getElementById('cardPast'), cr = document.getElementById('cardPresent'), cf = document.getElementById('cardFuture');
    
    function render(el, data) { 
        el.querySelector('.card-front').innerHTML = `<div class="card-name">${data.name}</div><div class="card-desc">${data.desc}</div>`; 
    }

    function draw() {
        cp.classList.remove('flipped'); cr.classList.remove('flipped'); cf.classList.remove('flipped');
        document.getElementById('quoteText').innerHTML = "感受牌陣傳來的訊息...<br>智慧正在浮現。";
        
        setTimeout(() => {
            const res = { 
                past: tarotDeck[Math.floor(Math.random()*tarotDeck.length)], 
                present: tarotDeck[Math.floor(Math.random()*tarotDeck.length)], 
                future: tarotDeck[Math.floor(Math.random()*tarotDeck.length)], 
                time: new Date().toLocaleString() 
            };
            currentResult = res;
            render(cp, res.past); render(cr, res.present); render(cf, res.future);
            setTimeout(() => { 
                cp.classList.add('flipped'); cr.classList.add('flipped'); cf.classList.add('flipped'); 
                document.getElementById('quoteText').innerHTML = "當下的啟示已顯現。<br>願光與你同在。";
            }, 150);
            updateHistory(res);
        }, 600);
    }

    function shareToFB() {
        if(!currentResult) {
            alert("請先開啟牌陣，再分享啟示喔！");
            return;
        }
        const url = window.location.href;
        const text = `✨ 靈境塔羅啟示 ✨\n【過去】：${currentResult.past.name}\n【現在】：${currentResult.present.name}\n【未來】：${currentResult.future.name}\n👉 點擊圖片，默唸問題領取你的祝福！`;
        const fbUrl = `https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(url)}&quote=${encodeURIComponent(text)}`;
        window.open(fbUrl, '_blank');
    }

    function updateHistory(res) {
        if(!res) return;
        let h = JSON.parse(localStorage.getItem('th')) || []; 
        if(res.time) h.unshift(res); 
        if(h.length>10) h.pop();
        localStorage.setItem('th', JSON.stringify(h));
        document.getElementById('historyList').innerHTML = h.map(i => `<div class="history-item"><small>${i.time}</small><br><strong>${i.past.name} | ${i.present.name} | ${i.future.name}</strong></div>`).join('');
    }

    document.getElementById('drawBtn').addEventListener('click', draw);
    document.getElementById('resetHistoryBtn').addEventListener('click', () => { 
        if(confirm('確定要清空所有占卜記錄嗎？')) { 
            localStorage.removeItem('th'); 
            document.getElementById('historyList').innerHTML = '';
        }
    });

    // 初次載入
    updateHistory();
</script>
</body>
</html>
