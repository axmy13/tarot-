<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>辛言解憂站 | 靈境塔羅</title>
    <style>
        :root { --bg: #050a1a; --gold: #d4af37; --card-back: #111; --text: #f4f4f4; }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: 'PingFang SC', sans-serif; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        
        .container { width: 94%; max-width: 600px; padding-bottom: 50px; }
        
        nav { display: flex; justify-content: space-around; padding: 15px 0; border-bottom: 1px solid rgba(212,175,55,0.3); width: 100%; background: rgba(5, 10, 26, 0.9); position: sticky; top: 0; z-index: 100; }
        nav a { color: var(--gold); text-decoration: none; font-size: 0.85rem; font-weight: bold; }

        header { text-align: center; padding: 20px; }
        h1 { color: var(--gold); letter-spacing: 4px; font-size: 1.6rem; margin: 0; }
        .quote-box { font-size: 0.85rem; color: #888; margin-top: 10px; min-height: 1.2rem; }

        /* 卡牌容器佈局 */
        .tarot-grid { display: flex; justify-content: space-between; gap: 10px; margin: 25px 0; }
        
        /* 單張卡牌樣式 */
        .card-slot { flex: 1; perspective: 1000px; text-align: center; }
        .slot-label { color: var(--gold); font-size: 0.75rem; margin-bottom: 10px; letter-spacing: 1px; }

        .card-inner { position: relative; width: 100%; aspect-ratio: 2/3.5; transition: transform 0.8s; transform-style: preserve-3d; cursor: pointer; }
        .card-inner.is-flipped { transform: rotateY(180deg); }
        .card-inner.is-reversed { transform: rotateY(180deg) rotateZ(180deg); }

        .card-front, .card-back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 8px; border: 1px solid var(--gold); box-sizing: border-box; }
        
        /* 牌背 - 建議換成 logo.png */
        .card-front { background: var(--card-back) url('logo.png') no-repeat center center; background-size: 60%; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        
        /* 牌面結果 */
        .card-back { background: #fff; color: #222; transform: rotateY(180deg); display: flex; flex-direction: column; padding: 10px; justify-content: space-between; box-shadow: 0 4px 15px rgba(212,175,55,0.2); }
        
        .card-title { font-size: 0.9rem; font-weight: bold; color: #1a237e; border-bottom: 1px solid #ddd; padding-bottom: 4px; margin-bottom: 5px; }
        .card-detail { font-size: 0.65rem; line-height: 1.3; text-align: left; }
        .card-detail b { color: #b71c1c; display: block; margin-top: 3px; }
        .card-advice { font-size: 0.6rem; color: #1b5e20; border-top: 1px dashed #ccc; padding-top: 4px; font-weight: bold; }

        .btn-main { background: var(--gold); color: #000; border: none; padding: 14px 40px; border-radius: 30px; font-weight: bold; font-size: 1rem; cursor: pointer; margin: 20px auto; display: block; transition: 0.3s; box-shadow: 0 5px 15px rgba(212,175,55,0.3); }
        .btn-main:active { transform: scale(0.95); }

        .log-section { margin-top: 40px; border-top: 1px solid rgba(212,175,55,0.2); padding-top: 20px; }
        .log-item { font-size: 0.75rem; color: #777; margin-bottom: 5px; }

        @media (max-width: 480px) {
            .card-title { font-size: 0.75rem; }
            .card-detail { font-size: 0.6rem; }
        }
    </style>
</head>
<body>

<nav>
    <a href="https://www.facebook.com/profile.php?id=61582018845158">🏠 辛言解憂站</a>
    <a href="#">🔮 靈境塔羅</a>
</nav>

<div class="container">
    <header>
        <h1>靈境塔羅</h1>
        <div id="daily-quote" class="quote-box">🔮 靜心冥想，點擊按鈕開啟感應。</div>
    </header>

    <div class="tarot-grid">
        <div class="card-slot">
            <div class="slot-label">過去</div>
            <div class="card-inner" id="card0" onclick="flipCard(0)">
                <div class="card-front"></div>
                <div class="card-back" id="content0"></div>
            </div>
        </div>
        <div class="card-slot">
            <div class="slot-label">現在</div>
            <div class="card-inner" id="card1" onclick="flipCard(1)">
                <div class="card-front"></div>
                <div class="card-back" id="content1"></div>
            </div>
        </div>
        <div class="card-slot">
            <div class="slot-label">未來</div>
            <div class="card-inner" id="card2" onclick="flipCard(2)">
                <div class="card-front"></div>
                <div class="card-back" id="content2"></div>
            </div>
        </div>
    </div>

    <button class="btn-main" onclick="initDraw()">✨ 啟動靈境牌陣 ✨</button>

    <div class="log-section" id="logs"></div>
</div>

<script>
const tarotDeck = [
    {n:"0. 愚者", up:{l:"新對象邂逅。", w:"創業好時機。", m:"有意外小財。", a:"大膽邁出第一步。"}, rev:{l:"承諾不穩定。", w:"規劃欠周詳。", m:"錢財易流失。", a:"認清現實再出發。"}},
    {n:"1. 魔術師", up:{l:"溝通很順暢。", w:"才華獲顯露。", m:"創意可變現。", a:"現在就行動。"}, rev:{l:"甜言蜜語多。", w:"執行力不足。", m:"財運不穩定。", a:"莫被假象迷惑。"}},
    {n:"2. 女祭司", up:{l:"精神層交流。", w:"宜靜不宜動。", m:"宜保守理財。", a:"請聽從直覺。"}, rev:{l:"心存有秘密。", w:"決策太表面。", m:"開支失判斷。", a:"走出自我孤立。"}},
    {n:"3. 皇后", up:{l:"感情很豐盛。", w:"項目收穫期。", m:"生活極優渥。", a:"享受當下美。"}, rev:{l:"感情現倦怠。", w:"資源分配亂。", m:"物慾過於強。", a:"回歸內心契合。"}},
    {n:"4. 皇帝", up:{l:"關係極穩定。", w:"權威獲提升。", m:"正財運勢強。", a:"建立明確秩序。"}, rev:{l:"態度太強勢。", w:"管理出紕漏。", m:"發展遇瓶頸。", a:"放軟姿態應對。"}},
    {n:"5. 教皇", up:{l:"長輩認可愛。", w:"得導師指引。", m:"聽專家意見。", a:"遵循既定準則。"}, rev:{l:"感情遭反對。", w:"職場太教條。", m:"財務出偏差。", a:"尋找靈魂導師。"}},
    {n:"6. 戀人", up:{l:"浪漫連結強。", w:"合作很愉快。", m:"合夥利生財。", a:"跟隨內心選。"}, rev:{l:"感情受考驗。", w:"溝通出缺口。", m:"因情而損財。", a:"保持理智分析。"}},
    {n:"7. 戰車", up:{l:"進展極迅速。", w:"競爭能勝出。", m:"財來自遠方。", a:"專注戰勝混亂。"}, rev:{l:"感情失方向。", w:"動力嚴重缺。", m:"意外開支多。", a:"找回內在控制。"}},
    {n:"8. 力量", up:{l:"溫柔化矛盾。", w:"以柔克剛強。", m:"理性控支出。", a:"信心是金鑰匙。"}, rev:{l:"耐心已耗盡。", w:"挑戰前退縮。", m:"情緒化消費。", a:"找回內在力量。"},
    {n:"9. 隱士", up:{l:"冷靜尋真愛。", w:"鑽研技術強。", m:"宜節流開支。", a:"向內探索答案。"}, rev:{l:"社交極孤立。", w:"職場訊息閉。", m:"財政陷困難。", a:"與外界建聯繫。"}},
    {n:"10. 命運輪", up:{l:"宿命緣分到。", w:"抓住新機遇。", m:"意外好收穫。", a:"順應自然變化。"}, rev:{l:"運勢較低迷。", w:"錯失了好機。", m:"避開大風險。", a:"靜待轉機降臨。"},
    {n:"11. 正義", up:{l:"平等且誠實。", w:"合同簽順利。", m:"收支很平衡。", a:"客觀承擔責任。"}, rev:{l:"感情被誤解。", w:"付出不等價。", m:"防法律風險。", a:"找回心中天秤。"},
    {n:"12. 吊人", up:{l:"換位去思考。", w:"瓶頸沉潛期。", m:"宜觀望理財。", a:"犧牲獲取回報。"}, rev:{l:"感情無進展。", w:"原地在踏步。", m:"僵局難突破。", a:"主動尋求轉變。"},
    {n:"13. 死神", up:{l:"結束舊關係。", w:"轉向新起點。", m:"清理舊負債。", a:"不破就不能立。"}, rev:{l:"恐懼談結束。", w:"抗拒轉型路。", m:"債務在擴大。", a:"放手才能重生。"},
    {n:"14. 節制", up:{l:"心靈很契合。", w:"協調有良方。", m:"管理很得法。", a:"平衡是成功路。"}, rev:{l:"溝通失平衡。", w:"人際極緊張。", m:"開支無規劃。", a:"找回生活節奏。"},
    {n:"15. 惡魔", up:{l:"慾望糾纏深。", w:"野心大壓大。", m:"偏財防陷阱。", a:"看清心中執念。"}, rev:{l:"感情覺醒時。", w:"走出職陰霾。", m:"財務漸透明。", a:"剪斷靈魂枷鎖。"},
    {n:"16. 高塔", up:{l:"突發分手事。", w:"重建契機到。", m:"突發性損失。", a:"崩潰後再重建。"}, rev:{l:"逃避大危機。", w:"內怨易爆發。", m:"損失緩期到。", a:"主動面對變革。"},
    {n:"17. 星星", up:{l:"療癒見希望。", w:"才華獲認可。", m:"長期增長強。", a:"保持心中熱忱。"}, rev:{l:"希望暫破滅。", w:"創意已枯竭。", m:"預算落了空。", a:"黑暗中尋微光。"},
    {n:"18. 月亮", up:{l:"不安且迷茫。", w:"充滿不確定。", m:"嚴控小預算。", a:"真相在迷霧中。"}, rev:{l:"真相大白時。", w:"方向變清晰。", m:"風險受控制。", a:"光芒即將回歸。"},
    {n:"19. 太陽", up:{l:"熱情喜悅多。", w:"名利獲雙收。", m:"財運極亨通。", a:"展現你的光芒。"}, rev:{l:"成功晚一步。", w:"發展暫受挫。", m:"盈餘不如願。", a:"保持陽光心態。"},
    {n:"20. 審判", up:{l:"舊情復燃結。", w:"努力被看見。", m:"糾紛得解決。", a:"開啟全新篇章。"}, rev:{l:"逃避抉擇路。", w:"錯失晉升期。", m:"財務糾紛拖。", a:"不再自欺欺人。"},
    {n:"21. 世界", up:{l:"圓滿且合一。", w:"更高新循環。", m:"物質極滿足。", a:"準備下個起點。"}, rev:{l:"仍存有缺憾。", w:"欠臨門一腳。", m:"未達預期標。", a:"堅持最後一段。"}
];

let currentPicks = [];

function initDraw() {
    // 重置卡片狀態
    for(let i=0; i<3; i++) {
        document.getElementById(`card${i}`).classList.remove('is-flipped', 'is-reversed');
        document.getElementById(`content${i}`).innerHTML = "";
    }
    
    // 隨機抽牌
    let shuffled = [...tarotDeck].sort(() => 0.5 - Math.random());
    currentPicks = shuffled.slice(0, 3).map(p => ({
        ...p,
        isRev: Math.random() < 0.5
    }));
    
    document.getElementById('daily-quote').innerText = "✨ 感應完成，請逐一翻開卡牌。";
}

function flipCard(idx) {
    if (currentPicks.length === 0) return;
    const card = currentPicks[idx];
    const el = document.getElementById(`card${idx}`);
    const content = document.getElementById(`content${idx}`);
    
    if (el.classList.contains('is-flipped')) return;

    const res = card.isRev ? card.rev : card.up;
    content.innerHTML = `
        <div class="card-title">${card.n}${card.isRev ? ' (逆)' : ''}</div>
        <div class="card-detail">
            <b>❤️ 愛情</b>${res.l}
            <b>💼 事業</b>${res.w}
            <b>💰 財運</b>${res.m}
        </div>
        <div class="card-advice">${res.a}</div>
    `;

    if (card.isRev) el.classList.add('is-reversed');
    else el.classList.add('is-flipped');
}
</script>
</body>
</html>
