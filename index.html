<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>解憂占卜站 | 靈境塔羅</title>
    
    <meta property="og:title" content="解憂占卜站 | 領取你的專屬塔羅啟示">
    <meta property="og:description" content="閉上雙眼，誠心感應。三牌陣將為你揭示過去、現在與未來的指引。✨">
    <meta property="og:image" content="https://axmy13.github.io/tarot-/logo.png">

    <style>
        :root { --primary-bg: #050510; --accent-gold: #d4af37; --text-color: #e0e0e0; }
        
        body { 
            margin: 0; padding: 0; font-family: 'PingFang SC', sans-serif; 
            background-color: var(--primary-bg); color: var(--text-color);
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
            overflow-x: hidden;
        }

        /* 這裡設定「手拿三張牌」那張圖為背景，並調得更透明、更神祕 */
        .bg-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(5, 5, 16, 0.8), rgba(5, 5, 16, 0.8)), url('cover.jpg') no-repeat center center;
            background-size: cover; z-index: -1; opacity: 0.3; /* 透明度調低，不亂 */
        }

        header { text-align: center; padding: 30px 0 10px; z-index: 2; }
        h1 { font-size: 1.8rem; color: var(--accent-gold); margin: 0; letter-spacing: 3px; text-shadow: 0 0 10px rgba(212,175,55,0.5); }
        .subtitle { font-size: 0.8rem; opacity: 0.7; margin-top: 5px; }

        .container { 
            width: 95%; max-width: 800px; display: flex; flex-direction: column; align-items: center; z-index: 2;
        }

        /* 這裡顯示「金蓮花」Logo */
        .logo-img { 
            width: 80px; height: auto; margin-top: 20px;
            filter: drop-shadow(0 0 15px var(--accent-gold)); 
        }

        #dailyQuote { 
            width: 85%; background: rgba(212, 175, 55, 0.05); 
            border-left: 3px solid var(--accent-gold); padding: 15px; 
            border-radius: 8px; margin: 25px 0; text-align: center; 
            font-size: 0.95rem; line-height: 1.6; color: #fff;
        }

        .cards-area { 
            display: none; flex-wrap: wrap; justify-content: center; gap: 15px; margin-top: 20px; width: 100%;
        }

        .card-box {
            width: 100%; max-width: 240px; background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(212, 175, 55, 0.3); border-radius: 15px;
            padding: 20px; box-sizing: border-box; text-align: left;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            animation: slideUp 0.8s ease forwards;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .card-label { color: var(--accent-gold); font-size: 0.75rem; font-weight: bold; margin-bottom: 10px; opacity: 0.8; }
        .card-name { font-size: 1.4rem; font-weight: bold; margin: 10px 0; color: var(--accent-gold); }
        .card-desc { font-size: 0.9rem; line-height: 1.8; color: #ddd; text-align: justify; }

        .controls { margin: 40px 0; display: flex; flex-direction: column; gap: 15px; width: 220px; }
        button { 
            padding: 14px; font-size: 1rem; background: transparent; 
            color: var(--accent-gold); border: 1.5px solid var(--accent-gold); 
            border-radius: 40px; cursor: pointer; transition: 0.3s; font-weight: bold;
            letter-spacing: 2px;
        }
        button:hover { background: var(--accent-gold); color: #000; box-shadow: 0 0 20px var(--accent-gold); }
        .share-btn { background: var(--accent-gold); color: #000; border: none; display: none; }

        footer { margin: 40px 0 20px; font-size: 0.7rem; opacity: 0.3; letter-spacing: 1px; }
    </style>
</head>
<body>

<div class="bg-overlay"></div>

<header>
    <h1>解憂占卜站</h1>
    <div class="subtitle">✨ 辛言老師 🔮 靈境塔羅 ✨</div>
</header>

<div class="container">
    <img src="logo.png" class="logo-img" alt="解憂占卜站">
    
    <div id="dailyQuote">
        <span id="quoteText">請靜心，在腦海中想著你的問題...<br>感覺對了，就點擊下方按鈕。</span>
    </div>

    <div class="cards-area" id="cardsArea">
        <div class="card-box">
            <div class="card-label">過去 | Past</div>
            <div id="p-name" class="card-name"></div>
            <div id="p-desc" class="card-desc"></div>
        </div>
        <div class="card-box">
            <div class="card-label">現在 | Present</div>
            <div id="n-name" class="card-name"></div>
            <div id="n-desc" class="card-desc"></div>
        </div>
        <div class="card-box">
            <div class="card-label">未來 | Future</div>
            <div id="f-name" class="card-name"></div>
            <div id="f-desc" class="card-desc"></div>
        </div>
    </div>

    <div class="controls">
        <button id="drawBtn" onclick="drawCards()">✨ 開啟啟示 ✨</button>
        <button id="shareBtn" class="share-btn" onclick="shareToFB()">🙏 分享好運</button>
        <button id="resetBtn" style="display:none; font-size: 0.7rem; border: none; opacity: 0.5; color: #fff;" onclick="location.reload()">重新占卜</button>
    </div>
</div>

<footer>CYBER-ZEN ORACLE © 2026</footer>

<script>
    // 這裡保留你剛才說很吸引讀者的詳細牌意
    const tarotDeck = [
        { name: "愚者", desc: "<b>✨ 啟示：</b> 放下所有的預設與擔憂，像孩子一樣純粹地擁抱未知。<br><b>🔮 建議：</b> 信任你的直覺。大膽躍下吧，宇宙會接住你。" },
        { name: "魔術師", desc: "<b>✨ 啟示：</b> 你正處於能量的巔峰。你手邊已經握有一切成功的工具。<br><b>🔮 建議：</b> 不要再猶豫，現在就是將靈感轉化為現實的時刻。" },
        { name: "女祭司", desc: "<b>✨ 啟示：</b> 答案在內心的靜默處。現在是觀察夢境與直覺的時刻。<br><b>🔮 建議：</b> 保持沉默。在行動之前，先讓智慧在心中沉澱。" },
        { name: "皇后", desc: "<b>✨ 啟示：</b> 這是豐盛與母性的能量。你所孕育的計畫正在茁壯成長。<br><b>🔮 建議：</b> 去感受自然與愛。允許自己享受生活的美好。" },
        { name: "皇帝", desc: "<b>✨ 啟示：</b> 秩序與權威的象徵。你需要理性的規劃與穩定的結構。<br><b>🔮 建議：</b> 展現你的自律。現在需要的是邏輯與掌控。" },
        { name: "教皇", desc: "<b>✨ 啟示：</b> 尋求傳統與導師的指引。遵循成熟的規範。<br><b>🔮 建議：</b> 聆聽前輩的經驗。群體的力量會給你帶來安全感。" },
        { name: "戀人", desc: "<b>✨ 啟示：</b> 關於價值觀的選擇與和諧的關係。<br><b>🔮 建議：</b> 聽從心底最真實的聲音。選擇與內在一致。" },
        { name: "戰車", desc: "<b>✨ 啟示：</b> 意志力的勝利。雖然有衝突，但你正全速衝向目標。<br><b>🔮 建議：</b> 保持專注與紀律。掌控好你的情緒之韁繩。" },
        { name: "力量", desc: "<b>✨ 啟示：</b> 內在的勇氣大於力量。勇氣在於溫柔的堅持。<br><b>🔮 建議：</b> 用愛與耐心去感化阻礙。接納自己的陰影。" },
        { name: "隱士", desc: "<b>✨ 啟示：</b> 向內探求真理。提著智慧的明燈。<br><b>🔮 建議：</b> 暫時遠離塵囂。獨處能讓你認清現狀。" },
        { name: "命運之輪", desc: "<b>✨ 啟示：</b> 變化是唯一的永恆。轉機已至。<br><b>🔮 建議：</b> 順應潮流而非對抗。幸運往往藏在意外的轉折裡。" },
        { name: "正義", desc: "<b>✨ 啟示：</b> 因果律的體現。客觀、冷靜且公正地評估。<br><b>🔮 建議：</b> 對自己的選擇負責。平衡終會恢復。" },
        { name: "倒吊人", desc: "<b>✨ 啟示：</b> 換個角度看世界。暫時的停滯是為了覺醒。<br><b>🔮 建議：</b> 不要急於行動。透過臣服與等待見證新視野。" },
        { name: "死神", desc: "<b>✨ 啟示：</b> 舊有的終結，新生的序幕。徹底的蛻變。<br><b>🔮 建議：</b> 勇敢告別過去。唯有結束才能讓新生命進入。" },
        { name: "節制", desc: "<b>✨ 啟示：</b> 煉金術般的調和。尋求完美的平衡。<br><b>🔮 建議：</b> 保持耐心。情緒的平穩是你目前最強大的力量。" },
        { name: "惡魔", desc: "<b>✨ 啟示：</b> 執著與束縛。你被自己的慾望或恐懼困住了。<br><b>🔮 建議：</b> 覺察那些看不見的枷鎖。認清真相，你隨時可以選擇自由。" },
        { name: "高塔", desc: "<b>✨ 啟示：</b> 劇變帶來的覺醒。虛假的安全感被摧毀。<br><b>🔮 建議：</b> 不要抗拒崩塌。這是重建真實基礎的最快方式。" },
        { name: "星星", desc: "<b>✨ 啟示：</b> 療癒與希望的暖流。黑暗後的黎明。<br><b>🔮 建議：</b> 保持信心。宇宙正眷顧著你，分享你的靈感與愛。" },
        { name: "月亮", desc: "<b>✨ 啟示：</b> 潛意識的幻象與不安。事情並非表面看起來的樣子。<br><b>🔮 建議：</b> 穿透迷霧。先安撫你內在那個受驚的孩子。" },
        { name: "太陽", desc: "<b>✨ 啟示：</b> 生命的喜悅與純粹的成功。一切充滿活力。<br><b>🔮 建議：</b> 盡情閃耀！分享你的快樂，這是一段被祝福的時光。" },
        { name: "審判", desc: "<b>✨ 啟示：</b> 靈魂的召喚與重獲新生。總結過去。<br><b>🔮 建議：</b> 寬恕自己與他人。聽從那份神聖的召喚。" },
        { name: "世界", desc: "<b>✨ 啟示：</b> 圓滿的大結局。世界就在你腳下。<br><b>🔮 建議：</b> 慶祝你的成就！同時準備好迎接新的循環。" }
    ];

    function drawCards() {
        const drawBtn = document.getElementById('drawBtn');
        const quoteText = document.getElementById('quoteText');
        const cardsArea = document.getElementById('cardsArea');
        const shareBtn = document.getElementById('shareBtn');
        const resetBtn = document.getElementById('resetBtn');

        drawBtn.style.display = 'none';
        quoteText.innerHTML = "✨ 正在與宇宙頻率連結中... ✨";

        setTimeout(() => {
            let shuffled = tarotDeck.sort(() => 0.5 - Math.random());
            let selected = shuffled.slice(0, 3);

            document.getElementById('p-name').innerText = selected[0].name;
            document.getElementById('p-desc').innerHTML = selected[0].desc;
            document.getElementById('n-name').innerText = selected[1].name;
            document.getElementById('n-desc').innerHTML = selected[1].desc;
            document.getElementById('f-name').innerText = selected[2].name;
            document.getElementById('f-desc').innerHTML = selected[2].desc;

            quoteText.innerHTML = "啟示已顯現。願智慧指引你的方向。";
            cardsArea.style.display = 'flex';
            shareBtn.style.display = 'block';
            resetBtn.style.display = 'inline-block';
        }, 1500);
    }

    function shareToFB() {
        const url = window.location.href;
        window.open(`https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(url)}`, '_blank');
    }
</script>

</body>
</html>
