<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>解憂占卜站 | 靈境塔羅</title>

    <meta property="og:title" content="解憂占卜站 | 領取你的專屬塔羅啟示">
    <meta property="og:description" content="當下即是啟示。抽一張塔羅牌，感受宇宙的指引與能量。">
    <meta property="og:type" content="website">
    <meta property="og:image" content="https://axmy13.github.io/tarot-/logo.png">

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap" rel="stylesheet">

    <style>
        html, body {
            margin: 0; padding: 0; background: #000; color: #ffd700;
            font-family: 'Cinzel', serif; height: 100%; overflow-x: hidden;
            display: flex; justify-content: center; align-items: center;
        }

        canvas { position: fixed; top: 0; left: 0; z-index: 1; }

        .container {
            position: relative; z-index: 2; text-align: center; padding: 20px;
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('cover.jpg') no-repeat center center;
            background-size: cover; backdrop-filter: blur(5px);
            border-radius: 20px; border: 1px solid rgba(255, 215, 0, 0.3);
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.2);
            max-width: 95%; width: 450px; min-height: 500px;
            display: flex; flex-direction: column; align-items: center;
            transition: all 0.5s ease;
        }

        .logo-img {
            width: 60px; /* 縮小 Logo 避免遮擋 */
            height: auto;
            margin-bottom: 10px;
            filter: drop-shadow(0 0 8px #ffd700);
        }

        .status {
            font-size: 16px; letter-spacing: 2px;
            margin: 10px 0; color: #fff;
        }

        /* 三張牌佈局 */
        .cards-container {
            display: none; /* 初始隱藏 */
            width: 100%;
            justify-content: space-around;
            margin: 20px 0;
            gap: 10px;
        }

        .card-item {
            flex: 1;
            background: rgba(255, 255, 255, 0.05);
            padding: 10px;
            border-radius: 10px;
            border: 1px solid rgba(255, 215, 0, 0.2);
            animation: fadeIn 0.8s ease forwards;
            opacity: 0;
        }

        .card-item:nth-child(2) { animation-delay: 0.3s; }
        .card-item:nth-child(3) { animation-delay: 0.6s; }

        .card-pos { font-size: 10px; color: #aaa; margin-bottom: 5px; }
        .card-name { font-size: 16px; font-weight: bold; color: #ffd700; margin-bottom: 5px; }
        .card-desc { font-size: 12px; line-height: 1.4; color: #eee; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .btn {
            background: transparent; border: 1px solid #ffd700;
            color: #ffd700; padding: 10px 20px;
            font-family: 'Cinzel', serif; font-size: 13px;
            cursor: pointer; border-radius: 50px;
            transition: all 0.3s; margin: 10px;
            width: 80%; text-decoration: none;
        }

        .btn:hover { background: #ffd700; color: #000; box-shadow: 0 0 20px #ffd700; }

        .share-btn {
            background: linear-gradient(45deg, #ffd700, #b8860b);
            color: #000; border: none; font-weight: bold; margin-top: 20px;
        }

        footer {
            position: absolute; bottom: 10px; font-size: 9px;
            letter-spacing: 2px; opacity: 0.5; z-index: 2;
        }
    </style>
</head>
<body>
    <canvas id="stars"></canvas>

    <div class="container">
        <img src="logo.png" alt="Logo" class="logo-img">
        
        <div id="status-text" class="status">Awaiting Inspiration</div>

        <button id="draw-btn" class="btn" onclick="drawThreeCards()">DRAW | 獲取三陣啟示</button>

        <div id="cards-view" class="cards-container">
            <div class="card-item">
                <div class="card-pos">過去 | Past</div>
                <div class="card-name" id="p-name"></div>
                <div class="card-desc" id="p-desc"></div>
            </div>
            <div class="card-item">
                <div class="card-pos">現在 | Present</div>
                <div class="card-name" id="n-name"></div>
                <div class="card-desc" id="n-desc"></div>
            </div>
            <div class="card-item">
                <div class="card-pos">未來 | Future</div>
                <div class="card-name" id="f-name"></div>
                <div class="card-desc" id="f-desc"></div>
            </div>
        </div>

        <div id="after-draw" style="display:none; width:100%;">
            <button class="btn" onclick="location.reload()">RE-DRAW | 重新占卜</button>
            <button class="btn share-btn" onclick="shareToFB()">SHARE BLESSING | 分享好運</button>
        </div>
    </div>

    <footer>CYBER-ZEN ORACLE © 2026</footer>

    <script>
        const tarotDeck = [
            { name: "太陽", desc: "充滿希望與成功的能量。" },
            { name: "星星", desc: "指引迷途的靈魂尋找方向。" },
            { name: "月亮", desc: "挖掘直覺，面對隱藏的恐懼。" },
            { name: "力量", desc: "以柔克剛，內在意志的展現。" },
            { name: "世界", desc: "階段性的圓滿與新的旅程。" },
            { name: "魔術師", desc: "萬事俱備，行動的時刻已到。" },
            { name: "隱士", desc: "內省與智慧的深度探索。" },
            { name: "命運之輪", desc: "順應變化，轉機即將現身。" }
        ];

        function drawThreeCards() {
            const statusText = document.getElementById('status-text');
            const drawBtn = document.getElementById('draw-btn');
            const cardsView = document.getElementById('cards-view');
            const afterDraw = document.getElementById('after-draw');

            drawBtn.style.display = 'none';
            statusText.innerText = "Connecting to your frequency...";

            setTimeout(() => {
                // 隨機選三張不重複的牌
                const shuffled = tarotDeck.sort(() => 0.5 - Math.random());
                const selected = shuffled.slice(0, 3);

                // 填入結果
                document.getElementById('p-name').innerText = selected[0].name;
                document.getElementById('p-desc').innerText = selected[0].desc;
                document.getElementById('n-name').innerText = selected[1].name;
                document.getElementById('n-desc').innerText = selected[1].desc;
                document.getElementById('f-name').innerText = selected[2].name;
                document.getElementById('f-desc').innerText = selected[2].desc;

                statusText.innerText = "The Oracle has spoken.";
                cardsView.style.display = 'flex';
                afterDraw.style.display = 'block';
            }, 1500);
        }

        function shareToFB() {
            const url = window.location.href;
            window.open(`https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(url)}`, '_blank');
        }

        // 星空特效
        const canvas = document.getElementById('stars');
        const ctx = canvas.getContext('2d');
        let particles = [];
        function initCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            particles = [];
            for (let i = 0; i < 100; i++) {
                particles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    size: Math.random() * 2,
                    speed: Math.random() * 0.5
                });
            }
        }
        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#ffd700';
            particles.forEach(p => {
                ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2); ctx.fill();
                p.y -= p.speed; if (p.y < 0) p.y = canvas.height;
            });
            requestAnimationFrame(animate);
        }
        window.addEventListener('resize', initCanvas);
        initCanvas(); animate();
    </script>
</body>
</html>
