<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>辛言解憂站 | 靈境塔羅</title>
    <style>
        :root { --bg: #050a1a; --gold: #d4af37; --card-back: #111; --text: #f4f4f4; }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; display: flex; flex-direction: column; align-items: center; min-height: 100vh; overflow-x: hidden; }
        .container { width: 92%; max-width: 500px; padding-bottom: 50px; }
        
        nav { display: flex; justify-content: space-around; padding: 15px 0; border-bottom: 1px solid rgba(212,175,55,0.2); width: 100%; background: rgba(5, 10, 26, 0.95); position: sticky; top: 0; z-index: 1000; }
        nav a { color: var(--gold); text-decoration: none; font-size: 0.9rem; font-weight: bold; }

        header { text-align: center; padding: 20px 0; }
        h1 { color: var(--gold); letter-spacing: 3px; font-size: 1.6rem; margin: 0; }
        .hint-text { font-size: 0.85rem; color: #888; margin-top: 10px; height: 1.2rem; }

        .tarot-area { display: flex; justify-content: space-between; gap: 8px; margin: 20px 0; }
        .card-slot { flex: 1; perspective: 1000px; }
        .slot-name { color: var(--gold); font-size: 0.75rem; margin-bottom: 8px; text-align: center; font-weight: bold; }

        .card-inner { position: relative; width: 100%; aspect-ratio: 2/3.5; transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1); transform-style: preserve-3d; cursor: pointer; }
        .card-inner.flipped { transform: rotateY(180deg); }
        .card-inner.reversed { transform: rotateY(180deg) rotateZ(180deg); }

        .card-front, .card-back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 8px; border: 1px solid var(--gold); box-sizing: border-box; }
        .card-front { background: var(--card-back) url('logo.png') no-repeat center center; background-size: 60%; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        .card-back { background: #fff; color: #222; transform: rotateY(180deg); display: flex; flex-direction: column; padding: 10px; box-shadow: 0 4px 15px rgba(212,175,55,0.2); overflow: hidden; }
        
        .c-title { font-size: 0.85rem; font-weight: bold; color: #1a237e; border-bottom: 1px solid #eee; padding-bottom: 4px; margin-bottom: 6px; text-align: center; }
        .c-desc { font-size: 0.65rem; line-height: 1.4; flex-grow: 1; text-align: left; }
        .c-desc b { color: #b71c1c; display: block; margin-top: 4px; border-left: 2px solid #b71c1c; padding-left: 5px; }
        .c-tip { font-size: 0.6rem; color: #1b5e20; border-top: 1px dashed #ccc; padding-top: 5px; margin-top: 5px; font-weight: bold; }

        .controls { display: flex; flex-direction: column; align-items: center; gap: 15px; margin-top: 25px; }
        #drawBtn { background: linear-gradient(135deg, #d4af37, #f2d06b); color: #000; border: none; padding: 15px 0; border-radius: 30px; font-weight: bold; font-size: 1.1rem; cursor: pointer; width: 85%; box-shadow: 0 5px 20px rgba(212,175,55,0.4); -webkit-tap-highlight-color: transparent; }
        .share-btn { background: transparent; color: var(--gold); border: 1px solid var(--gold); padding: 10px 0; border-radius: 30px; font-size: 0.9rem; width: 65%; cursor: pointer; }
    </style>
</head>
<body>

<nav>
    <a href="https://axmy13.github.io/my-oracle/">🏠 辛言解憂站</a>
    <a href="https://axmy13.github.io/tarot-/">🔮 靈境塔羅</a>
</nav>

<div class="container">
    <header>
        <h1>靈境塔羅</h1>
        <div id="statusHint" class="hint-text">🔮 靜心感應，點擊按鈕啟動牌陣。</div>
    </header>

    <div class="tarot-area">
        <div class="card-slot">
            <div class="slot-name">【過去】</div>
            <div class="card-inner" id="card0">
                <div class="card-front"></div>
                <div class="card-back" id="face0"></div>
            </div>
        </div>
        <div class="card-slot">
            <div class="slot-name">【現在】</div>
            <div class="card-inner" id="card1">
                <div class="card-front"></div>
                <div class="card-back" id="face1"></div>
            </div>
        </div>
        <div class="card-slot">
            <div class="slot-name">【未來】</div>
            <div class="card-inner" id="card2">
                <div class="card-front"></div>
                <div class="card-back" id="face2"></div>
            </div>
        </div>
    </div>

    <div class="controls">
        <button id="drawBtn">✨ 啟動靈境牌陣 ✨</button>
        <button class="share-btn" onclick="shareToFB()">分享啟示 · 傳遞好運</button>
    </div>
</div>

<script>
// 牌組數據
const deck = [
    {n:"0. 愚者", u:{l:"邂逅新對象。", w:"啟動新計劃。", m:"意外的小錢。", a:"勇敢踏出舒適區。"}, r:{l:"承諾不靠譜。", w:"規劃欠考慮。", m:"莫衝動消費。", a:"認清現狀再行動。"}},
    {n:"1. 魔術師", u:{l:"溝通很順暢。", w:"展現新才華。", m:"創意可變現。", a:"現在就是好時機。"}, r:{l:"花言巧語多。", w:"執行力不足。", m:"防投資陷阱。", a:"莫被假象所迷惑。"}},
    {n:"2. 女祭司", u:{l:"精神層交流。", w:"宜觀察待機。", m:"宜靜觀其變。", a:"請信任你的直覺。"}, r:{l:"心存有秘密。", w:"決策太表面。", m:"開支失判斷。", a:"走出孤立，多交流。"}},
    {n:"3. 皇后", u:{l:"感情很豐盛。", w:"項目收穫期。", m:"生活很優渥。", a:"享受當下的豐盛。"}, r:{l:"感情現倦怠。", w:"資源分配亂。", m:"物慾過於強。", a:"找回內心與自然。"}},
    {n:"4. 皇帝", u:{l:"關係穩如山。", w:"權威獲提升。", m:"正財運勢強。", a:"建立明確的秩序。"}, r:{l:"態度太強勢。", w:"管理出紕漏。", m:"發展遇瓶頸。", a:"放軟姿態更有效。"}},
    {n:"5. 教皇", u:{l:"得長輩認可。", w:"有貴人指引。", m:"聽專業建議。", a:"遵循傳統與智慧。"}, r:{l:"觀念有衝突。", w:"做事太教條。", m:"防訊息誤差。", a:"尋找靈魂的導師。"}},
    {n:"6. 戀人", u:{l:"浪漫的連結。", w:"合作很愉快。", m:"合夥利生財。", a:"跟隨內心的選擇。"}, r:{l:"面臨抉擇難。", w:"溝通出缺口。", m:"防情變損財。", a:"理智分析真需求。"}},
    {n:"7. 戰車", u:{l:"進展極迅速。", w:"競爭中勝出。", m:"財來自遠方。", a:"專注目標必成功。"}, r:{l:"方向不清晰。", w:"動力嚴重缺。", m:"意外開支多。", a:"找回內在控制感。"}},
    {n:"8. 力量", u:{l:"柔情化矛盾。", w:"以柔克剛強。", m:"理性控支出。", a:"信心是成功關鍵。"}, r:{l:"耐心已耗盡。", w:"挑戰前退縮。", m:"情緒化花錢。", a:"找回內在的勇氣。"},
    {n:"9. 隱士", u:{l:"冷靜尋真愛。", w:"鑽研技術強。", m:"宜節流度日。", a:"往內求才有答案。"}, r:{l:"自我太封閉。", w:"訊息太遲滯。", m:"財政陷困難。", a:"主動與外界連結。"},
    {n:"10. 命運輪", u:{l:"宿命的緣分。", w:"抓住新機遇。", m:"意外好收穫。", a:"順應自然的變化。"}, r:{l:"運勢較反覆。", w:"錯失了好機。", m:"避開大風險。", a:"靜待下一個轉機。"},
    {n:"11. 正義", u:{l:"平等且誠實。", w:"合同簽順利。", m:"收支很平衡。", a:"客觀公正地處理。"}, r:{l:"感情被誤解。", w:"付出不等價。", m:"防法律風險。", a:"修正心中的偏見。"},
    {n:"12. 吊人", u:{l:"換位去思考。", w:"瓶頸沉潛期。", m:"宜保守觀望。", a:"換個角度看世界。"}, r:{l:"無謂的犧牲。", w:"原地在踏步。", m:"僵局難突破。", a:"主動尋求轉變點。"},
    {n:"13. 死神", u:{l:"結束舊關係。", w:"迎來新轉型。", m:"清理舊負債。", a:"不破就不能立。"}, r:{l:"抗拒談結束。", w:"轉型極痛苦。", m:"債務在擴大。", a:"放手才能更自在。"},
    {n:"14. 節制", u:{l:"心靈很契合。", w:"協調有良方。", m:"管理很得法。", a:"平衡是成功之道。"}, r:{l:"溝通失平衡。", w:"人際極緊張。", m:"開支無節制。", a:"找回生活的節奏。"},
    {n:"15. 惡魔", u:{l:"慾望糾纏深。", w:"野心大壓大。", m:"偏財防陷阱。", a:"看清心中的執念。"}, r:{l:"感情覺醒時。", w:"走出職陰霾。", m:"財務漸透明。", a:"勇敢剪斷舊枷鎖。"},
    {n:"16. 高塔", u:{l:"突發的分手。", w:"重建的契機。", m:"突發性損失。", a:"崩潰後重生更強。"}, r:{l:"逃避大危機。", w:"內怨易爆發。", m:"損失緩期到。", a:"長痛不如短痛。"},
    {n:"17. 星星", u:{l:"療癒見希望。", w:"才華獲認官。", m:"長期增長強。", a:"保持心中的純真。"}, r:{l:"希望暫破滅。", w:"創意已枯竭。", m:"預算落了空。", a:"黑暗中尋找微光。"},
    {n:"18. 月亮", u:{l:"不安且迷茫。", w:"充滿變數期。", m:"嚴控小預算。", a:"真相在迷霧背後。"}, r:{l:"真相大白時。", w:"方向變清晰。", m:"風險受控制。", a:"擁抱直覺與潛意識。"},
    {n:"19. 太陽", u:{l:"熱情喜悅多。", w:"名利獲雙收。", m:"財運極亨通。", a:"展現你的正能量。"}, r:{l:"成功晚一步。", w:"發展暫受挫。", m:"盈餘不如願。", a:"保持陽光的心態。"},
    {n:"20. 審判", u:{l:"舊情復燃結。", w:"努力被看見。", m:"糾紛得解決。", a:"開啟全新的一頁。"}, r:{l:"逃避做決定。", w:"錯失晉升期。", m:"財務糾紛拖。", a:"誠實地面對自我。"},
    {n:"21. 世界", u:{l:"圓滿且合一。", w:"更高的循環。", m:"物質極滿足。", a:"慶祝階段性成功。"}, r:{l:"仍存有缺憾。", w:"欠臨門一腳。", m:"未達預期標。", a:"堅持最後一段路。"}
];

let activeSelection = [];

// 初始化事件監聽
document.addEventListener('DOMContentLoaded', () => {
    const drawBtn = document.getElementById('drawBtn');
    
    // 啟動按鈕點擊
    drawBtn.addEventListener('click', () => {
        // 重置狀態
        activeSelection = [];
        for(let i=0; i<3; i++) {
            const card = document.getElementById(`card${i}`);
            card.classList.remove('flipped', 'reversed');
            document.getElementById(`face${i}`).innerHTML = "";
        }
        
        // 隨機抽選
        let shuffle = [...deck].sort(() => Math.random() - 0.5);
        let picked = shuffle.slice(0, 3);
        picked.forEach(p => {
            activeSelection.push({ ...p, isRev: Math.random() < 0.5 });
        });
        
        document.getElementById('statusHint').innerText = "✨ 感應完成！請點擊卡片翻牌。";
    });

    // 卡片翻轉點擊
    [0, 1, 2].forEach(idx => {
        const cardEl = document.getElementById(`card${idx}`);
        cardEl.addEventListener('click', () => {
            if (activeSelection.length === 0) {
                alert("請先點擊啟動按鈕！");
                return;
            }
            if (cardEl.classList.contains('flipped') || cardEl.classList.contains('reversed')) return;

            const data = activeSelection[idx];
            const content = data.isRev ? data.r : data.u;
            
            document.getElementById(`face${idx}`).innerHTML = `
                <div class="c-title">${data.n}${data.isRev ? '<br>(逆位)' : '(正位)'}</div>
                <div class="c-desc">
                    <b>❤️ 愛情</b>${content.l}
                    <b>💼 事業</b>${content.w}
                    <b>💰 財運</b>${content.m}
                </div>
                <div class="c-tip">💡 ${content.a}</div>
            `;

            if (data.isRev) cardEl.classList.add('reversed');
            else cardEl.classList.add('flipped');
        });
    });
});

function shareToFB() {
    const u = encodeURIComponent(window.location.href);
    window.open(`https://www.facebook.com/sharer/sharer.php?u=${u}`, '_blank');
}
</script>
</body>
</html>
