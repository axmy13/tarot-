<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>灵境塔罗 - 忘忧占卜站</title>
    <style>
        :root { --primary-bg: #0f0c29; --accent-gold: #d4af37; --text-color: #e0e0e0; --card-back-bg: #1c1c3c; --card-front-bg: #fff; }
        body { margin: 0; padding: 0; font-family: 'PingFang SC', sans-serif; background: linear-gradient(135deg, #0f0c29 0%, #302b63 100%); color: var(--text-color); display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        header { text-align: center; padding: 20px 0; }
        h1 { font-size: 2rem; color: var(--accent-gold); margin: 0; }
        .subtitle { font-size: 0.9rem; opacity: 0.8; margin-top: 5px; }
        #dailyQuote { width: 90%; max-width: 600px; background: rgba(212, 175, 55, 0.1); border-left: 4px solid var(--accent-gold); padding: 12px; border-radius: 8px; margin: 15px 0; text-align: center; font-style: italic; font-size: 0.9rem; }
        .container { display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; perspective: 1500px; margin-bottom: 20px; }
        .card-container { width: 100px; height: 180px; position: relative; }
        .card-label { position: absolute; top: -22px; width: 100%; text-align: center; color: var(--accent-gold); font-size: 0.8rem; font-weight: bold; }
        .card-inner { position: relative; width: 100%; height: 100%; transition: transform 0.8s; transform-style: preserve-3d; }
        .card-inner.flipped { transform: rotateY(180deg); }
        .card-front, .card-back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 10px; border: 2px solid var(--accent-gold); display: flex; flex-direction: column; align-items: center; padding: 10px; box-sizing: border-box; }
        .card-back { background-color: var(--card-back-bg); justify-content: center; font-size: 2.5rem; color: var(--accent-gold); }
        .card-front { background-color: var(--card-front-bg); color: #24243e; transform: rotateY(180deg); justify-content: flex-start; overflow-y: auto; }
        .card-name { font-size: 1.1rem; font-weight: bold; margin: 5px 0; color: #302b63; }
        .card-desc { font-size: 0.75rem; line-height: 1.5; text-align: left; }
        .controls { margin: 15px 0; display: flex; gap: 10px; }
        button { padding: 10px 20px; font-size: 0.9rem; background: transparent; color: var(--accent-gold); border: 2px solid var(--accent-gold); border-radius: 25px; cursor: pointer; }
        #history { width: 90%; max-width: 600px; background: rgba(255, 255, 255, 0.05); border-radius: 10px; padding: 15px; margin-bottom: 30px; font-size: 0.85rem; }
        .history-item { border-bottom: 1px solid rgba(212, 175, 55, 0.2); padding: 10px 0; }
        @media (min-width: 600px) { .card-container { width: 160px; height: 280px; } .card-name { font-size: 1.4rem; } .card-desc { font-size: 0.95rem; } }
    </style>
</head>
<body>
<header><h1>忘忧占卜站</h1><div class="subtitle">✨ 辛言老师 🔮 灵境塔罗 ✨</div></header>
<div id="dailyQuote"><span style="color:var(--accent-gold)">每日一语：</span><span id="quoteText">静心思考，答案自然浮现。</span></div>
<div class="container">
    <div class="card-container"><div class="card-label">过去</div><div class="card-inner" id="cardPast"><div class="card-back">❂</div><div class="card-front"></div></div></div>
    <div class="card-container"><div class="card-label">现在</div><div class="card-inner" id="cardPresent"><div class="card-back">❂</div><div class="card-front"></div></div></div>
    <div class="card-container"><div class="card-label">未来</div><div class="card-inner" id="cardFuture"><div class="card-back">❂</div><div class="card-front"></div></div></div>
</div>
<div class="controls"><button id="drawBtn">✨ 开启牌阵 ✨</button><button id="resetHistoryBtn">🧹 清空记录</button></div>
<div id="history"><h3 style="color:var(--accent-gold);margin:0;font-size:1rem;">占卜记录</h3><div id="historyList"></div></div>
<script>
    const tarotDeck = [
        { name: "愚者", desc: "旅程的开始，放下恐惧，以纯真的心拥抱未知。相信直觉，大胆迈出第一步。" },
        { name: "魔术师", desc: "你拥有创造现实的能力。现在是行动时刻，运用意志力去达成你的梦想。" },
        { name: "女祭司", desc: "转向内在，倾听直觉的声音。答案深藏在潜意识中，信任你的内在智慧。" },
        { name: "皇后", desc: "预示着富足与滋养。感受自然的韵律，享受当下的美好，让爱自然流动。" },
        { name: "皇帝", desc: "建立秩序与权威。运用理性和自律掌控局面，稳扎稳打构建你的梦想蓝图。" },
        { name: "教皇", desc: "寻求精神指引。遵循成熟规范，在传统智慧中找到前行的力量。" },
        { name: "恋人", desc: "和谐的结合与重要选择。请依据内心的真实想法，寻找身心合一的平衡。" },
        { name: "战车", desc: "胜利来自于坚强意志。保持专注，掌控内在矛盾，克服障碍勇往直前。" },
        { name: "力量", desc: "真正的力量源于内心。用温和化解危机，用爱感化冲动，展现内在坚韧。" },
        { name: "隐士", desc: "内省与寻求真理。独处并非孤独，在宁静中审视自我，智慧将在静默中涌现。" },
        { name: "命运之轮", desc: "转机与周期。生活正如车轮不断旋转，接受变化，转机已至，保持觉察。" },
        { name: "正义", desc: "平衡与责任。以客观冷静的态度对待局势，做出公正选择，收获你种下的果。" },
        { name: "倒吊人", desc: "牺牲与等待。换个角度看世界，这种停滞是必要的洗礼，往往能豁然开朗。" },
        { name: "死神", desc: "周期的结束与新生。坦然接受陈旧事物的离去，以开放的心拥抱新的可能。" },
        { name: "节制", desc: "平衡与融合。运用耐心和谐地结合不同元素，保持平和，让一切水到渠成。" },
        { name: "恶魔", desc: "束缚与诱惑。找回理智打破枷锁，这种束缚往往源于你内心的执着和恐惧。" },
        { name: "高塔", desc: "剧变与觉醒。陈旧结构崩塌是为了迎接真实自我，真实终将在废墟中重建。" },
        { name: "星星", desc: "希望与灵性滋养。抬起头感受治愈力量，希望永存，你正走在正确的道路上。" },
        { name: "月亮", desc: "不安与幻象。不要被迷雾蒙蔽，深入潜意识去寻找答案，有些事还需要时间。" },
        { name: "太阳", desc: "全面成功与快乐。尽情享受阳光般的喜悦，展现真实自我，成功已至尽情闪耀。" },
        { name: "审判", desc: "觉醒与复活。总结过去，赦免错误，以全新的面貌去迎接未来，生命重塑。" },
        { name: "世界", desc: "圆满与成就。达到了目标，感到充实满足。成就已成，世界就在你脚下。" }
    ];
    const quotes = ["静心思考，答案自然浮现。", "此刻的迷茫，是智慧升级的前提。", "允许一切发生，接受一切改变。", "相信直觉，它是灵魂的窃窃私语。"];
    const cp = document.getElementById('cardPast'), cr = document.getElementById('cardPresent'), cf = document.getElementById('cardFuture');
    function render(el, data) { el.querySelector('.card-front').innerHTML = `<div class="card-name">${data.name}</div><div class="card-desc">${data.desc}</div>`; }
    function draw() {
        cp.classList.remove('flipped'); cr.classList.remove('flipped'); cf.classList.remove('flipped');
        document.getElementById('quoteText').innerText = quotes[Math.floor(Math.random()*quotes.length)];
        setTimeout(() => {
            const res = { past: tarotDeck[Math.floor(Math.random()*22)], present: tarotDeck[Math.floor(Math.random()*22)], future: tarotDeck[Math.floor(Math.random()*22)], time: new Date().toLocaleString() };
            render(cp, res.past); render(cr, res.present); render(cf, res.future);
            setTimeout(() => { cp.classList.add('flipped'); cr.classList.add('flipped'); cf.classList.add('flipped'); }, 100);
            updateHistory(res);
        }, 300);
    }
    function updateHistory(res) {
        let h = JSON.parse(localStorage.getItem('th')) || []; h.unshift(res); if(h.length>10) h.pop();
        localStorage.setItem('th', JSON.stringify(h));
        document.getElementById('historyList').innerHTML = h.map(i => `<div class="history-item"><small>${i.time}</small><br><strong>${i.past.name} | ${i.present.name} | ${i.future.name}</strong></div>`).join('');
    }
    const evt = 'ontouchstart' in window ? 'touchstart' : 'click';
    document.getElementById('drawBtn').addEventListener(evt, (e) => { e.preventDefault(); draw(); });
    document.getElementById('resetHistoryBtn').addEventListener(evt, () => { if(confirm('清空记录吗？')) { localStorage.removeItem('th'); location.reload(); }});
    updateHistory(); // 初次加载显示历史
</script>
</body>
</html>
