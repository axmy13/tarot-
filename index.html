<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>解憂占卜站 | 靈境塔羅</title>
    
    <meta property="og:title" content="🔮 解憂占卜站｜靈境塔羅：領取你的專屬啟示">
    <meta property="og:description" content="起心動念，皆有定數。這份來自宇宙的指引，將為你照亮前路。">
    <meta property="og:url" content="https://axmy13.github.io/tarot-/">
    <meta property="og:image" content="https://axmy13.github.io/tarot-/cover.jpg">
    <meta property="og:type" content="website">

    <style>
        :root { --bg: #0a1128; --gold: #d4af37; --card-bg: #ffffff; --text: #f4f4f4; }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: 'PingFang SC', sans-serif; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        
        /* 頂部視覺圖區域 */
        .hero-image { width: 100%; max-width: 500px; margin-top: 20px; border-radius: 15px; box-shadow: 0 0 20px rgba(212, 175, 55, 0.3); }
        
        header { text-align: center; padding: 20px; }
        h1 { color: var(--gold); letter-spacing: 5px; margin: 10px 0; font-size: 2rem; }
        .container { width: 92%; max-width: 900px; }
        
        /* 牌陣佈局 */
        .tarot-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin: 30px 0; }
        .card-slot { text-align: center; }
        .slot-label { color: var(--gold); font-weight: bold; margin-bottom: 10px; }
        .card-content { background: var(--card-bg); color: #222; border-radius: 12px; padding: 20px; min-height: 250px; border: 2px solid var(--gold); display: none; animation: fadeIn 0.8s; }
        .card-name { font-size: 1.2rem; font-weight: bold; color: #1a237e; border-bottom: 2px solid var(--gold); margin-bottom: 12px; padding-bottom: 5px; }
        .card-meaning { font-size: 0.9rem; line-height: 1.6; text-align: left; margin-bottom: 15px; }
        .card-advice { font-size: 0.85rem; color: #b71c1c; font-weight: bold; text-align: left; border-top: 1px dashed #ddd; padding-top: 10px; }

        .btn-group { display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; margin-bottom: 40px; }
        button { padding: 12px 25px; border-radius: 30px; border: none; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-main { background: var(--gold); color: #000; font-size: 1.1rem; }
        .btn-sec { background: rgba(255,255,255,0.1); color: #fff; border: 1px solid var(--gold); }
        
        .log-section { width: 100%; border-top: 1px solid rgba(212,175,55,0.3); padding-top: 20px; margin-bottom: 50px; }
        .log-item { background: rgba(255,255,255,0.05); padding: 12px; border-radius: 8px; margin-bottom: 8px; font-size: 0.85rem; border-left: 4px solid var(--gold); }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; } }
        @media (max-width: 768px) { .tarot-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<img src="cover.jpg" alt="解憂占卜站" class="hero-image">

<header>
    <h1>解憂占卜站</h1>
    <div style="color:var(--gold); opacity: 0.9;">✨ 辛言老師推薦 ｜ 靈境塔羅 ✨</div>
</header>

<div class="container">
    <div class="tarot-grid">
        <div class="card-slot"><div class="slot-label">【過去】</div><div id="c1" class="card-content"></div></div>
        <div class="card-slot"><div class="slot-label">【現在】</div><div id="c2" class="card-content"></div></div>
        <div class="card-slot"><div class="slot-label">【未來】</div><div id="c3" class="card-content"></div></div>
    </div>

    <div class="btn-group">
        <button class="btn-main" onclick="draw()">✨ 啟動靈境牌陣 ✨</button>
        <button class="btn-sec" onclick="shareToFB()">臉書分享</button>
        <button class="btn-sec" onclick="location.reload()">重新感應</button>
    </div>

    <div class="log-section">
        <div style="color:var(--gold); margin-bottom:15px;">占卜記錄</div>
        <div id="logs"></div>
    </div>
</div>

<script>
const tarotDeck = [
    {n:"星星", m:"代表希望與療癒。你正找回內心的平靜，過去的創傷正在癒合。", a:"保持信心，讓靈感引導你，曙光就在前方。"},
    {n:"皇后", m:"象徵富足與滋養。這是一個充滿創造力與生命力的時期，會有實質的收穫。", a:"學會享受當下的美好，慷慨地分享你的愛。"},
    {n:"世界", m:"代表圓滿與達成。一個階段的完美結束，你感到前所未有的充實。", a:"慶祝你的成就，準備迎接更高層次的挑戰。"},
    {n:"力量", m:"代表內在勇氣。不需要暴力的壓制，用耐心與溫柔去克服難關。", a:"以柔克剛，保持耐性，你比想像中更強大。"},
    {n:"魔術師", m:"象徵掌控與資源。你手中已握有解決問題的所有關鍵鑰匙。", a:"現在是將想法付諸行動的最佳時機。"},
    {n:"女祭司", m:"代表直覺。某些真相隱藏在表象下，需要你靜心感悟。", a:"信任你的直覺，聽從內心深處的聲音。"},
    {n:"教皇", m:"代表傳統與指引。你可能需要尋求權威或長輩的專業建議。", a:"遵循既定的準則，虛心學習，尋求智慧的引導。"},
    {n:"戀人", m:"象徵選擇與和諧。你正站在重要的分叉路口，需要平衡理智與情感。", a:"做出符合你真心的選擇，珍惜重要的夥伴關係。"},
    {n:"戰車", m:"代表勝利與意志。憑藉堅強的鬥志，你必能克服萬難達到目標。", a:"保持專注，控制好情緒，勇往直前。"}
    // 這裡可以繼續添加更多牌項...
];

function draw() {
    let shuffled = [...tarotDeck].sort(() => 0.5 - Math.random());
    let picks = shuffled.slice(0, 3);

    picks.forEach((card, i) => {
        const el = document.getElementById(`c${i+1}`);
        el.innerHTML = `<div class="card-name">${card.n}</div><div class="card-meaning">${card.m}</div><div class="card-advice">💡 建議：${card.a}</div>`;
        el.style.display = 'block';
    });

    const timeStr = new Date().toLocaleTimeString();
    const logStr = `<div class="log-item"><strong>${timeStr}</strong> - ${picks.map(p=>p.n).join(' | ')}</div>`;
    document.getElementById('logs').insertAdjacentHTML('afterbegin', logStr);
}

function shareToFB() {
    const url = encodeURIComponent(window.location.href);
    window.open(`https://www.facebook.com/sharer/sharer.php?u=${url}`, '_blank');
}
</script>
</body>
</html>
